run:
  output_dir: runs
  timezone: Asia/Shanghai

logging:
  output_dir: logs

dashboard:
  display_timezone: Asia/Shanghai

market:
  enabled: true
  source: binance
  proxy:
    enabled: false
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - ADAUSDT
    - DOGEUSDT
    - AVAXUSDT
    - LINKUSDT
    - DOTUSDT
    - TRXUSDT
    - LTCUSDT
    - BCHUSDT
    - UNIUSDT
    - AAVEUSDT
    - NEARUSDT
    - ATOMUSDT
    - ETCUSDT
    - FILUSDT
    - ARBUSDT
    - OPUSDT
  ohlcv:
    storage_dir: data/market/ohlcv
    sources:
      - binance
      - binance_spot
      - binance_usdm
      - okx_spot
      - okx_swap
      - bybit_spot
      - bybit_swap
      - kucoin_spot
      - kucoin_swap
      - bitget_spot
      - bitget_swap
      - kraken_spot
      - coinbase_spot
    timeframes:
      - 1m
      - 5m
      - 15m
      - 1h
      - 4h
      - 1d
      - 1w
      - 1month
    lookback:
      1m: 1440
      5m: 2016
      15m: 2016
      1h: 720
      4h: 720
      1d: 500
      1w: 260
      1month: 120
  derivatives:
    enabled: false
  anomalies:
    enabled: false

macro_calendar:
  enabled: false

onchain_flow:
  enabled: false

user_state:
  enabled: false
  path: user_state.local.yaml

monitor:
  enabled: false
  interval_seconds: 300
  max_cycles: 1
  failure_backoff_max_seconds: 3600
  cooldown_seconds: 3600
  output_dir: runs/monitor
  source_cadence_seconds:
    market: 300
    derivatives: 300
    text: 300
    macro_calendar: 3600
    onchain_flow: 3600
  target_stage: build_materials
  no_codex: true

quant:
  enabled: true
  engine: vectorbt
  effectiveness_gates:
    min_positive_net_return_benchmark_pct: 25.0
    max_cost_drag_pct: 6.0
    require_walk_forward_stable: false
    min_walk_forward_positive_net_return_window_pct: 0.0
  strategies:
    - name: tsmom_vol_scaled
      enabled: true
      params:
        return_window: 120
        volatility_window: 60
        target_volatility: 0.2
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
        mode: long_flat
    - name: signed_tsmom_trend
      enabled: true
      params:
        return_window: 120
        deadband_pct: 1.0
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
    - name: breakout_atr_trend
      enabled: true
      params:
        breakout_window: 120
        exit_window: 20
        atr_window: 14
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
        mode: long_flat
    - name: sma_cross_trend
      enabled: true
      params:
        short_window: 20
        long_window: 30
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
        mode: long_flat
    - name: bollinger_rsi_reversion
      enabled: true
      params:
        bollinger_window: 20
        band_std: 2.0
        rsi_window: 14
        rsi_oversold: 30
        rsi_overbought: 70
        trend_window: 100
        trend_filter_pct: 10.0
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
        mode: long_flat
  parameter_diagnostics:
    enabled: true
    max_combinations: 16
    grids:
      tsmom_vol_scaled:
        return_window:
          - 80
          - 120
        volatility_window:
          - 60
          - 120
        target_volatility:
          - 0.15
          - 0.2
      signed_tsmom_trend:
        return_window:
          - 80
          - 120
        deadband_pct:
          - 0.5
          - 1.0
      breakout_atr_trend:
        breakout_window:
          - 80
          - 120
        exit_window:
          - 10
          - 20
        atr_window:
          - 14
      sma_cross_trend:
        short_window:
          - 10
          - 20
        long_window:
          - 30
          - 50
      bollinger_rsi_reversion:
        bollinger_window:
          - 20
        band_std:
          - 2.0
          - 2.5
        rsi_window:
          - 14
        rsi_oversold:
          - 25
          - 30
        rsi_overbought:
          - 70
          - 75
        trend_window:
          - 50
          - 100
        trend_filter_pct:
          - 10.0

text:
  enabled: true
  max_items: 30
  intelligence:
    enabled: true
    model_cache_dir: data/models/text
    allow_model_download: false
    models:
      embedding:
        provider: sentence_transformers
        name: sentence-transformers/all-MiniLM-L6-v2
        revision: pinned
      classifier:
        provider: transformers_zero_shot
        name: facebook/bart-large-mnli
        revision: pinned
      sentiment:
        provider: transformers_text_classification
        name: ProsusAI/finbert
        revision: pinned
      ner:
        provider: gliner
        name: urchade/gliner_medium-v2.1
        revision: pinned
    thresholds:
      duplicate_similarity: 0.92
      same_topic_similarity: 0.82
      classifier_accept_score: 0.65
      classifier_top_margin: 0.10
      entity_accept_score: 0.50
      max_topic_window_hours: 48
  sources:
    - name: coindesk
      type: rss
      url: https://www.coindesk.com/arc/outboundfeeds/rss/
    - name: cointelegraph
      type: rss
      url: https://cointelegraph.com/rss

report:
  title: 每日市场情报简报
  language: zh-CN

codex:
  enabled: true
  command: codex
  args:
    - exec
    - --sandbox
    - read-only
    - "-"
  timeout_seconds: 300
