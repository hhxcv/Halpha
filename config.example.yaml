run:
  output_dir: runs
  timezone: Asia/Shanghai

market:
  enabled: true
  source: binance
  proxy:
    enabled: false
  symbols:
    - BTCUSDT
    - ETHUSDT
  ohlcv:
    storage_dir: data/market/ohlcv
    timeframes:
      - 1d
      - 1h
    lookback:
      1d: 500
      1h: 720

quant:
  enabled: true
  engine: vectorbt
  strategies:
    - name: tsmom_vol_scaled
      enabled: true
      params:
        return_window: 30
        volatility_window: 30
        target_volatility: 0.2
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
        mode: long_flat
    - name: breakout_atr_trend
      enabled: true
      params:
        breakout_window: 55
        exit_window: 20
        atr_window: 14
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
        mode: long_flat
    - name: bollinger_rsi_reversion
      enabled: true
      params:
        bollinger_window: 20
        band_std: 2.0
        rsi_window: 14
        rsi_oversold: 30
        rsi_overbought: 70
        trend_window: 100
        trend_filter_pct: 10.0
      backtest:
        enabled: true
        initial_cash: 10000
        fees_bps: 10
        slippage_bps: 5
        mode: long_flat
  parameter_diagnostics:
    enabled: true
    max_combinations: 16
    grids:
      tsmom_vol_scaled:
        return_window:
          - 20
          - 30
        volatility_window:
          - 20
          - 30
        target_volatility:
          - 0.15
          - 0.2
      breakout_atr_trend:
        breakout_window:
          - 20
          - 55
        exit_window:
          - 10
          - 20
        atr_window:
          - 14
      bollinger_rsi_reversion:
        bollinger_window:
          - 20
        band_std:
          - 2.0
          - 2.5
        rsi_window:
          - 14
        rsi_oversold:
          - 25
          - 30
        rsi_overbought:
          - 70
          - 75
        trend_window:
          - 50
          - 100
        trend_filter_pct:
          - 10.0

text:
  enabled: true
  max_items: 30
  sources:
    - name: coindesk
      type: rss
      url: https://www.coindesk.com/arc/outboundfeeds/rss/
    - name: cointelegraph
      type: rss
      url: https://cointelegraph.com/rss

report:
  title: 每日市场情报简报
  language: zh-CN

codex:
  enabled: true
  command: codex
  args:
    - exec
    - --sandbox
    - read-only
    - "-"
  timeout_seconds: 300
