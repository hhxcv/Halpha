name: Scheduled Package and Docs

on:
  schedule:
    # Every Friday at 03:17 UTC.
    - cron: "17 3 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-package-build:
    name: Python package build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build check-manifest twine

      - name: Prepare report directory
        run: mkdir -p package-and-docs-reports

      - name: Build source and wheel distributions
        run: python -m build --sdist --wheel

      - name: Check distribution metadata
        run: twine check --strict dist/*

      - name: Check source distribution manifest
        run: |
          set -o pipefail
          check-manifest -v | tee package-and-docs-reports/check-manifest.txt
        continue-on-error: true

      - name: Upload package build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-python-package-build
          path: |
            dist/
            package-and-docs-reports/

  python-environment-resolution:
    name: Python environment resolution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare report directory
        run: mkdir -p package-and-docs-reports

      - name: Install project development environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-licenses
          python -m pip install -e ".[dev]"

      - name: Check dependency consistency
        run: |
          set -o pipefail
          python -m pip check | tee package-and-docs-reports/pip-check.txt

      - name: Record resolved environment
        if: always()
        run: |
          python -m pip freeze > package-and-docs-reports/pip-freeze.txt
          python -m pip list --outdated --format=json > package-and-docs-reports/pip-outdated.json || true
          pip-licenses \
            --format=markdown \
            --with-authors \
            --with-urls \
            --output-file package-and-docs-reports/python-dependency-licenses.md || true

      - name: Compile Python sources and tests
        run: python -m compileall -q src tests

      - name: Verify CLI import path
        run: python -m halpha --help > package-and-docs-reports/halpha-help.txt

      - name: Verify pytest discovery
        run: |
          set -o pipefail
          pytest --collect-only -q | tee package-and-docs-reports/pytest-collect.txt

      - name: Upload environment reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-python-environment-reports
          path: package-and-docs-reports/

  documentation-link-check:
    name: Documentation link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p lychee

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir "${{ github.workspace }}"
            --verbose
            --no-progress
            --exclude-mail
            --accept 200,204,206,429
            './README.md'
            './AGENTS.md'
            './MILESTONES.md'
            './docs/**/*.md'
            './.agents/**/*.md'
          fail: false
          format: markdown
          jobSummary: true
          output: lychee/link-check-report.md
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-documentation-link-report
          path: lychee/link-check-report.md
