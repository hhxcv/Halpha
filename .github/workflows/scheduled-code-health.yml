name: Scheduled Code Health

on:
  schedule:
    # Every Friday at 02:57 UTC.
    - cron: "57 2 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-code-health:
    name: Python code health
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit deptry radon xenon vulture semgrep

      - name: Prepare report directory
        run: mkdir -p code-health-reports

      - name: Bandit security lint
        run: |
          set -o pipefail
          bandit -r src -f txt | tee code-health-reports/bandit.txt
        continue-on-error: true

      - name: Semgrep Python and security rules
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --metrics=off \
            --json \
            --output code-health-reports/semgrep.json
        continue-on-error: true

      - name: Vulture dead code scan
        run: |
          set -o pipefail
          vulture src tests --min-confidence 80 | tee code-health-reports/vulture.txt
        continue-on-error: true

      - name: Dependency hygiene
        run: |
          set -o pipefail
          deptry . | tee code-health-reports/deptry.txt
        continue-on-error: true

      - name: Cyclomatic complexity
        run: |
          set -o pipefail
          radon cc src -s -a | tee code-health-reports/radon-cc.txt
        continue-on-error: true

      - name: Maintainability index
        run: |
          set -o pipefail
          radon mi src -s | tee code-health-reports/radon-mi.txt
        continue-on-error: true

      - name: Complexity threshold check
        run: |
          set -o pipefail
          xenon --max-absolute B --max-modules A --max-average A src | tee code-health-reports/xenon.txt
        continue-on-error: true

      - name: Upload code health reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scheduled-code-health-reports
          path: code-health-reports/
