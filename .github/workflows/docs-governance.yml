name: Documentation checks

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.14"
          cache: pip
          cache-dependency-path: governance/requirements.txt

      - name: Install locked governance dependency
        run: python -m pip install --require-hashes -r governance/requirements.txt

      - name: Validate documentation structure
        run: python .agents/skills/write-halpha-docs/scripts/validate_halpha_docs.py docs

      - name: Validate current plan safety
        run: python governance/validate_current_plan.py

      - name: Run plan safety unit tests
        run: python -m unittest discover -s governance/tests -p "test_*.py"

      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}" HEAD

      - name: Check pushed commit whitespace
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check
          fi
