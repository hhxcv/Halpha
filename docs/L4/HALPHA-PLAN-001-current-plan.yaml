document_id: HALPHA-PLAN-001
level: L4
language: zh-CN
as_of: 2026-07-21

current_summary: >-
  Halpha 在现有 Windows 10 单机上持续完善最小交易闭环。开发每次选择一个可验证的小结果，
  只补足必要设计，随后实现、验证、修复并集成；不设置小时门、多轴资格或默认长期观察。
  独立市场与策略研究可与产品工作并行。

current_product_boundary:
  outcome: >-
    支持计划配置与固定、一次激活、持续监控、交易所动作执行、保护、退出、核对、复盘和用户接管。
  includes:
    - DEMO 完整闭环
    - LIVE_READ_ONLY 公开行情观察
    - LIVE_WRITE（真实账户交易）的无凭据实现、安全反例和一次受限真实激活能力
    - 本地交易工作台、Windows 运行、邮件通知、备份恢复和官方入口接管
  excludes:
    - 第二个正式策略
    - 多账户、多场所和组合优化
    - 自动扩大资金范围
    - 高可用、微服务、机构审批或治理平台

current_decisions:
  target_host: Windows 10 Pro 22H2 x64
  host_rule: 不迁移、不缩减目标；如实记录依赖支持限制，并以本机直接验证判断当前可用性
  development_flow: CONTINUOUS_SMALL_ITERATIONS
  iteration_rule: 每次围绕一个可验证的小结果完成必要设计、实现、验证和修复，验证通过后直接集成
  capital_authority: 半自动计划中用户配置并固定的交易金额就是本次资金边界；激活只让计划开始运行
  build_identity: 每组产品输入只使用一个 product_build_id
  observation: 只有当前发布、部署或真实资金决定提出直接测试无法回答的问题时才增加观察
  research: >-
    AI 可在独立研究边界内，基于项目当前问题、既有证据和外部调研自主选择一个有价值的可证伪问题；
    问题与取舍理由由对应研究材料记录，结果仍须由项目所有者决定是否进入产品。

current_facts:
  source:
    repository: 当前 Git 工作区
    identity_rule: 构建或验证时直接读取提交、分支和工作树；本计划不抄写易失真的 SHA
    checked_at: 2026-07-21
  evidence_limit: >-
    历史测试和观察只说明当时输入；当前实现仍在连续修改，因此不把历史结果表述为当前产品闭环或真实账户交易能力。
  persistence:
    migration_head: 20260721_0010
    demo_database_at_head: true
    live_database_at_head: false
    product_record_family_count: 10

target_runtime:
  host:
    operating_system: Windows 10 Pro 22H2
    build: 10.0.19045
    architecture: x64
    dependency_caveat: >-
      当前 NautilusTrader 版本的常规 Windows 支持边界不包含该主机；项目记录此限制，
      通过本机安装、启停、重启和联合链路验证判断当前可用性，不表述为供应商保证。
  trading:
    venue: Binance USDⓈ-M
    demo_instruments: [BTCUSDT-PERP, ETHUSDT-PERP]
    first_live_instrument: BTCUSDT-PERP
    strategy: ONE_SHOT_DONCHIAN_ATR_BREAKOUT
    account_configuration_mutation: DISABLED
  topology:
    database: PostgreSQL
    processes: [halpha-app, halpha-executor]
    windows_tasks: ['\Halpha\App', '\Halpha\Executor', '\Halpha\Backup']
    lifecycle_control_cli: halpha-control
    lifecycle_default_config: config/halpha.toml
    lifecycle_generated_output_language: ASCII_ENGLISH
    lifecycle_pass_through_text: SOURCE_PRESERVED
    lifecycle_inventory_scope: 当前仓库及所有已登记 Git 工作树中的项目进程树、TCP 监听、外部主动登记和 Windows Halpha 任务
    product_start_group: [app, executor]
    auxiliary_start_rule: backup 只能显式单独启动，不随 product 启动
    external_service_registry: '%LOCALAPPDATA%\Halpha\external-services 或 HALPHA_EXTERNAL_SERVICE_REGISTRY 覆盖路径'
    external_service_registration: PRODUCER_WRITES_JSON_AND_PID_LISTENER_IS_VERIFIED
    external_service_control: STATUS_ONLY
    direct_product_long_running_start: PROHIBITED
    exchange_change_paths_per_environment: 1
    web: 127.0.0.1 本地 Web
    notification: EMAIL_ONLY

component_sources:
  python_locks:
    - requirements/runtime.txt
    - requirements/dev.txt
  independent_research_python_lock: research/requirements.txt
  frontend_lock: frontend/package-lock.json
  project_metadata: pyproject.toml
  runtime_configuration: config/*.toml
  key_current_versions:
    python: 3.13.14
    nautilus_trader: 1.230.0
    postgresql: 17.10
    node: 24.18.0
  rule: 精确依赖以锁文件为准；运行时不下载依赖

current_strategy:
  owner: HALPHA-ALP-002
  strategy_id: ONE_SHOT_DONCHIAN_ATR_BREAKOUT
  strategy_version: 1.0.1
  parameter_schema_version: 1.3.0
  registry: src/halpha/planning/strategy_registry.json
  instrument: BTCUSDT-PERP
  supported_directions: [LONG, SHORT]
  historical_limit: 历史模型未包含 funding，只支持机制检查，不证明实时净收益或 Alpha

product_build:
  target: ONE_PRODUCT_BUILD_ID
  current_product_build_id: d8cb41345cc3392e00e178f257ec7d534726f0ce2e4d5989d865f5beaf26d1c3
  implementation: src/halpha/product_build.py
  current_status: CALCULATED_BY_APP_AND_EXECUTOR
  rule: 只散列产品运行文件和有效非秘密配置；时间、Git 状态、文档、测试与验证报告不参与

current_iteration:
  focus: >-
    仅在 DEMO 和唯一现有策略范围内，通过工作台进行短周期使用、发现问题、最小修复并再次使用；
    普通用户交易动作只通过界面完成，真实账户交易请求保持关闭。
  validation:
    - 直接相关后端与前端测试
    - 工作台实际浏览器使用
    - Binance Demo 下单、成交、保护、退出和复盘事实核对
  current_result: >-
    App 与 Executor 已使用同一产品版本；策略改用 Binance 已闭合 15m K 线，
    与工作台行情口径一致。一次自然信号 Demo 交易已通过工作台完成入场、保护、盈利退出和复盘，
    净结果为 +0.20185 USDT，闭合后没有开放或未知执行责任。
  next_candidates:
    - 继续通过工作台执行短周期 Demo 交易；无信号时允许按截止时间结束，不为制造交易而绕过策略条件
    - 继续核对成交质量、净盈亏和执行异常是否提供足够的用户决策信息
    - 只在实际使用暴露问题时增加直接修复和对应验证

real_account_trading:
  design_owner: HALPHA-TRADEPLAN-002、HALPHA-CAP-002、HALPHA-EXE-002、HALPHA-SYS-002
  exchange_change_requests_allowed: false
  credentials_loaded: false
  current_activation_id: null
  execution_actions_created: false
  exchange_changes_observed: false
  database_current: false
  unique_executor_confirmed: false
  facts_current: false

independent_research:
  product_work_dependency: NONE
  owned_path: research/**
  selection_mode: AI_AUTONOMOUS_WITHIN_RESEARCH_BOUNDARY
  question_record: 对应 research/** 研究材料
  product_effects: NONE_UNTIL_OWNER_SELECTS_RESULT
  environment:
    python: 3.13.14
    lock: research/requirements.txt
    isolation: 与产品虚拟环境、依赖锁、运行时和构建身份分离
  primary_framework:
    name: vectorbt
    version: 1.1.0
    role: 适合数组或 bar 表达的问题的统计与滚动分析、批量候选筛选、敏感性比较和初步组合模拟
    product_runtime_dependency: false
    execution_semantics_authority: false
  product_quant_core:
    name: NautilusTrader
    role: 唯一产品量化交易核心，以及获选策略候选进入产品后的事件、订单、成交与在线离线一致性验证
  qualification:
    checked_at: 2026-07-21
    host: Windows 10 Pro 22H2 x64
    result: vectorbt 1.1.0 在 Python 3.13.14 完成参数广播、rolling split、DSR、时间移位和费用滑点验证
    isolation_reason: vectorbt 1.1.0 要求 pandas 3.x，产品当前因 NautilusTrader 兼容边界锁定 pandas 2.3.3
    evidence: research/README.md、research/verify_vectorbt.py
  handoff:
    applicable_to: OWNER_SELECTED_STRATEGY_CANDIDATE_ONLY
    owner_selection_required: true
    research_output: 仅对获选策略候选提供框架无关的固定策略说明、小型输入与确定性决策轨迹
    product_implementation: 在产品路径重新实现或审查纯策略逻辑，不导入 VectorBT 或研究目录
    product_acceptance: 相同规范输入的决策一致性检查，以及 NautilusTrader 事件与执行语义验证
    shared_runtime_or_cache: false
