    - HALPHA-TRADEPLAN-001@v1.7.0
    - HALPHA-DAT-001@v2.3.0
    - HALPHA-CAP-001@v2.9.0
    - HALPHA-EXE-001@v1.6.0
    - HALPHA-OUT-001@v1.5.0
    - HALPHA-UX-001@v1.5.0
    - HALPHA-SYS-001@v1.5.0
    - HALPHA-ENG-001@v1.6.0
  owner_confirmed_at: 2026-07-16
  owner_confirmed_p0_requirements:
    - 策略逻辑由代码实现并可复用，界面只配置 schema 允许的参数；P0 不建设 DSL、脚本上传或可视化编排器
    - 每次激活只运行一个交易周期；首次成交后最终完全平仓即永久结束，不自动再次开仓
    - 可同时激活多个策略，但每个激活独占 max_margin、max_notional、max_allowed_loss，资金仍在 Binance 账户
    - max_margin 与 max_notional 只约束 Halpha 主动增加风险；行情造成自然越界不构成强制减仓或平仓要求
    - 本激活净结果等于 realized_pnl 加 unrealized_pnl 加 funding 减 commission；loss 为其负值与零的较大者
    - max_allowed_loss 只受本激活行为和持仓影响；触线停止新增风险并退出该激活全部持仓，其他策略不参与
    - Binance USDⓈ-M 永续支持建仓、撤单、减仓和平仓以及止盈止损；Halpha 条件成立后可提交市价、限价或经资格化的场所条件单；场所支持的条件交给场所，不支持的由 Halpha 持续监测
    - 三类控制分别为停止新增风险、退出策略和用户接管；用户接管后 Halpha 不自动撤单或平仓
    - Windows 持续运行，邮件为 P0 唯一外部通知渠道
    - 首个策略采用单次 Donchian/ATR 突破、市价入场、场所止损、分级止盈和时间退出
  owner_decisions_accepted:
    - 同一 environment/account/instrument 从激活与额度建立到 closure/release 硬互斥；激活前该 instrument 必须零持仓、零开放普通/算法订单且无外部/未知责任
    - Binance 账户固定 one-way、isolated、single-asset，杠杆由用户预设为 1–5x；Halpha 只读校验，不自动改模式、杠杆、转账或提现
    - 首个 LIVE 闭环只用 BTCUSDT-PERP；ETHUSDT-PERP 仅作 Demo 映射与并发验证
    - Web 只监听本机 127.0.0.1；P0 没有远程或移动控制面
    - 接受 NautilusTrader/BacktestEngine 实际能力妥协：止损与止盈以 LAST_PRICE/Binance CONTRACT_PRICE 触发；固定 1.230.0 虽可提交 close_position，但无 quantity 的算法单在当前无 persistent cache 恢复拓扑中不能生成 OrderStatusReport，故 P0 不增加低层写取消或私有 patch，而采用每笔正成交显式数量、reduce_only StopMarket 分片保护，TP1/TP2 也使用显式数量 reduce_only；无 closePosition、OCO、追踪、保本移动或保护替换；B00 必须先证明这些订单同时开放及部分触发不会产生 Binance -2022/-4118、反向仓位或不可取消责任，失败即退回修订而不进入 B01
    - 接受首策略本 L4 的精确参数范围、默认值、30 秒保护/损失 UNKNOWN 退出 deadline 与事实 freshness；历史 bar-only 回测以决策 cutoff 的已闭合 1m LAST 收盘和 manifest 固定 0.0006 费率作为明确标记的 reference-price/fee 代理，不伪装成实时 MARK/盘口或账户实际费率；固定 Cython BacktestEngine 不结算资金费，历史 manifest/report 明示 funding_model=NOT_MODELED，P0 不为此自研结算器或切换 2.0 RC；历史绩效只完整报告并由用户显式接受，不设自动盈利硬门
    - 接受 external_order_claims=None 的当前单一路径和 B00 失败即阻断规则；不预建任何第二恢复拓扑

