planning_horizon: >-
  当前只展开 P0。P0 交付一个带基本 Web 工作台的最小真实交易闭环：用户选择代码策略、配置参数和互斥额度，
  一次激活后可离开，Halpha 持续判断、下单、保护、止盈止损、退出、核对、复盘并释放额度。
  首个闭环使用 Binance USDⓈ-M 永续和 ONE_SHOT_DONCHIAN_ATR_BREAKOUT；P0 之外模块暂不设计。

design_scope_rule:
  l3: P0 涉及模块采用长期契约；记录长期采用的组件、使用方式、权威边界和失败语义，不限定为首个策略
  l4: 固定 P0 当前建设基线；精确版本、配置、参数、接线和包内顺序可按实现证据调整
  deferred: 不为 P0 未涉及能力预留平台、服务、数据库、记录族、worker 或扩展点

implementation_adaptation_rule:
  strictness_by_level:
    L0_L2: 产品边界、稳定语义、所有权和复杂度原则必须严格遵守
    L3: 长期模块契约、权威边界、失败语义和唯一写链必须保持；组件用法可随已验证公开能力作兼容调整
    L4: 当前版本、参数、配置、接线、探针和建设包内细节是可调整基线，不要求实现逐字复制
  may_adjust_during_implementation: >-
    可依据固定组件的公开行为、目标 Windows 实测、Binance Demo 证据和可维护性调整 L4 细节，
    并把最终值和证据回写本计划或 BuildManifest；不因可预见的小差异反复修订 L0–L3。
  revision_required_when: >-
    调整会改变 L0–L3 稳定语义、P0 最小真实交易闭环、资金与机器授权边界、结果未知/用户接管/恢复责任、
    单一真实写链、第三方优先原则或复杂度硬上限时，必须先修订拥有该语义的上位文档。
  stop_review_rule: 核心方向和边界基本无误、已记录上游冲突且不存在会阻断 P0 的未决方向问题时停止设计修正，转入实现验证；L4 非核心细节留给实际开发。

