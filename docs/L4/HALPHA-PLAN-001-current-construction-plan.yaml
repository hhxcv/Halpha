historical_and_runtime_evidence:
  strategy_manifest:
    identity: strategy_version + build_digest + normalized_parameter_digest + direction + instrument/rules/fee/capital/engine/data-proxy/margin-mode-compatibility/effective-leverage digests
    first_real_scope: B04 从 schema 合法范围内冻结一组由用户实际选择的参数与 LONG/SHORT 方向并完成全部证据；默认值只作初始建议。B05 只允许该精确 manifest，其他参数组合在分别资格化前仅支持 DEMO
    change_rule: 代码、参数、方向、instrument 规则、费用/规模上限、保证金模式兼容规则、effective_leverage、组件版本或 BacktestEngine 配置变化均形成新 manifest 和新证据；实际杠杆变化但 effective_leverage 与兼容规则不变时不单独形成新 manifest
  historical:
    engine: NautilusTrader BacktestEngine
    strategy: 与实时完全相同的 HalphaStrategyAdapter、纯逻辑类和 StrategyProposal→ProposedAction 规范化；历史 gateway 只把已闭合 1m LAST close 标记为 BACKTEST_LAST_BAR_PROXY 后传给同一纯 sizing 函数，后续使用 accepted TRADEPLAN/CAP/EXE 环境动作契约
    data:
      source: Binance 官方 USDⓈ-M 公开 BTCUSDT 1m contract bars；15m 由同一 INTERNAL BarType 聚合，不读取第二 15m、mark-price bar、quote 或资金费流
      development_period: 2022-01-01T00:00:00Z/2024-12-31T23:59:59Z
      holdout_period: 2025-01-01T00:00:00Z/2026-06-30T23:59:59Z
      requirements: 原始文件、官方 checksum 或下载摘要、UTC 规范、重复/缺口报告；缺失样本不插值
      reuse:
        - 用公开 BarDataWrangler 把规范 OHLCV 转为 Nautilus Bar
        - 用 ParquetDataCatalog 保存 instrument 与 1m bars，供 BacktestEngine 重复读取；不自研 parser、行情数据库或 replay loop
      funding_model:
        status: NOT_MODELED
        reason: 固定 `nautilus_trader.backtest.engine.BacktestEngine` 只接受 Cython Strategy/数据路径，不会把 FundingRateUpdate 送入资金费结算；同 wheel 的 Rust/PyO3 BacktestEngine 又不接受实时使用的 Cython Strategy
        consequence: manifest、报告和 owner 接受必须显著披露历史净值不含 funding，不能把历史 activation_net 表述为实时四项损失口径或精确净收益
        compromise: 接受该证据局限以保持同一 live/backtest 策略与单一量化栈；不自研 funding settlement、不增加第二策略 adapter，也不在 P0 切换 2.0 RC
    engine_models:
      fee: MakerTakerFeeModel；该模型直接读取 Instrument.maker_fee/taker_fee，证据 instrument 两者均固定为 0.0006 保守上界并进入 manifest；不自研 fee model
      slippage: OneTickSlippageFillModel
      latency: LatencyModel；B00 固定 exact constructor/config digest 后历史、Demo 对照和报告不得更换
      funding: NOT_MODELED；不向 Cython BacktestEngine 注入不会被结算的 FundingRateUpdate，也不以离线脚本改写账户净值
      bar_execution: bar_adaptive_high_low_ordering=true
      liquidity_consumption: false，因为输入没有订单簿深度
      same_bar_rule: 接受 BacktestEngine adaptive high/low ordering；不增加 Halpha 自研最有利/最不利撮合分支
    product_specific_bridge:
      action_owner_status: ALIGNED；TRADEPLAN 只拥有 ProposedAction，EXE 唯一拥有环境限定 ExecutionAction
      retained_components: [StrategyProposal normalization, CAP pure check, environment action mapping, activation_net reconciliation]
      stable_contracts: [HALPHA-TRADEPLAN-002@v0.10.0, HALPHA-CAP-002@v1.2.0, HALPHA-EXE-002@v1.2.0, HALPHA-OUT-002@v0.8.0]
      forbidden: 自研 bar fill、订单状态机、滑点模型、funding settlement、PnL engine、绩效库或报告器
    reporting:
      component: ReportProvider 与内置 ProfitFactor、MaxDrawdown、WinRate 等统计
      halpha_additions: manifest、完整交易数、平均净 R、一次性/额度/保护不变量、缺失输入和证据判定
    episode_harness:
      scope: 仅测试；不是生产 Strategy、记录族、worker 或运行入口
      behavior: >-
        从冻结起点创建一个独立 one-shot PlanActivation；其闭合/无入场到期后，测试 harness 才在下一 bar 创建同参数的新 activation，
        依次运行到区间结束，任何时刻不重叠。每个 episode 仍只能一个交易周期，产品运行代码没有自动再次激活逻辑。

      aggregation: 按事件时间串行汇总各独立 episode 的框架账户净值；固定初始权益且不把后一 episode 的信息泄漏到前一 episode
    preregistration: 第一次读取 holdout 输出前冻结精确 manifest、用户选择的 schema 合法参数、方向、数据摘要、engine config、费用、三轴和最大真实名义上限
    technical_safety_gate:
      - 数据、模型、费用、funding_model=NOT_MODELED、episode 和 manifest 完整可复现；关键动作不能由框架表达时状态为 INSUFFICIENT，不以自研撮合/PnL 补过
      - 一次性周期、额度、最大损失锁存后不再增险、保护和全平后不再入场断言零违规；最终滑点损失可超过 max_allowed_loss，必须如实报告而不能算作阈值失效
      - live/backtest proposal golden vectors、LAST_PRICE 条件触发、费用与不含 funding 的历史净值、所有产品 bridge 断言通过
    performance_report:
      target_sample: 目标至少 30 个完整闭合 episode；不足时明确样本不足，不伪造或放宽
      report_only: 平均净 R、ProfitFactor、MaxDrawdown、WinRate、交易数、方向和 development/holdout 差异全部报告，但不把盈利阈值误作系统可实现性硬门
      owner_decision: B05 前项目所有者必须查看并明确接受实际报告、样本不足和亏损可能；文档不声称盈利保证
    qualification_evidence:
      status: QUALIFIED
