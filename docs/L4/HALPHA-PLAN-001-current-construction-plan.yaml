planning_horizon: >-
  当前只展开 P0。P0 交付一个带基本 Web 工作台的最小真实交易闭环：用户选择代码策略、配置参数和互斥额度，
  在运行连续且入场终态与场所原生保护均已确认后可离开，Halpha 持续判断、下单、保护、止盈止损、退出、核对、复盘并释放额度。
  首个 LIVE 闭环从激活到上述条件成立必须由用户主动在线监控，并已验证最小操作入口和 Binance 官方入口可用；P0 不宣称无人在线故障自动恢复。
  首个闭环使用 Binance USDⓈ-M 永续和 ONE_SHOT_DONCHIAN_ATR_BREAKOUT。P0 使用 MANUAL_PLAN_RESUME：Executor、主机或 PostgreSQL 写连续性丢失后开放激活先暂停，
  只读核对后由用户明确选择恢复激活、退出策略或用户接管；长期严格证据自动续行不在 P0 实现。除本计划显式登记、对 P0 产品闭环保持零 effects 的独立研究轨外，P0 之外产品模块暂不设计。
  R00 在自身包契约冻结后可通过独立 worktree/branch 与 B04/B05 包级并行；R01 可在 R00 完成后开始，但完成、政策冻结和 confirmation 边界必须等待 B04 最终数据边界，R02 再按 R01 完成与政策冻结推进。研究轨不属于 P0 产品运行时；R03 仍等待 R02、B05、V01 与项目所有者证据选择。本计划不定义 P1–P3；上位设计保留交互形态可演进性不构成任何阶段的建设承诺或当前支持。

