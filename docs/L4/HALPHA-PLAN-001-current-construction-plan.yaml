  本计划是项目所有者已接受的当前建设状态入口。DEMO 系统机制验证优先、DEMO/LIVE 共用 EXE 执行实现、环境限定 CAP、AI 主导独立研究、monorepo 并行集成及文档 Git-only 历史规则已进入 accepted_design_set；
  D00=ALIGNED、B00=QUALIFIED、B01–B03=COMPLETED、B04=IN_PROGRESS，当前授权 B04 与 R00，B05 按依赖推进，B05 后执行人工 V01。研究设计已接受但当前尚未创建；R00 不依赖 B04，现只等待本计划进入干净 Git 基线、绑定 base_revision 与冻结完整包契约；
  R01 可在 R00 完成后开始，但其完成、研究政策冻结和 confirmation 边界固定等待 B04 最终数据边界；R02 再按 R01 与政策门推进。R00–R02 只以零 P0 effects、独立 worktree/branch 和资源 fail-closed 边界并行，R03 继续等待 R02、B05、V01 与项目所有者证据选择。当前工作树未提交，BuildManifest 不具备发布资格；
  工程资格不等于真实资金权限，B05 未获授权且 runtime_real_write_gate 保持 CLOSED。
