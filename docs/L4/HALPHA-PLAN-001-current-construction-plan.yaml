      version: 1.230.0
      source_tag: v1.230.0
      source_commit: 8160730c7c550480b0a439fb11086a4c4de15f0b
      license: LGPL-3.0-or-later
      status: CONDITIONALLY_SELECTED_UNTIL_B00
