dependency_qualification_gate:
  id: B00
  kind: PRE_CONSTRUCTION_GATE
  name: 固定 NautilusTrader、Binance 与目标 Windows 资格
  status: PLANNED
  prerequisites:
    - D00=ACCEPTED_FOR_B00；若仅做不进入主实现的隔离 spike，则仍需项目所有者单独明确授权
    - 项目所有者提供目标 Windows edition/build 非秘密信息；若不在 NautilusTrader 1.230.0 官方 Windows Server 2022+ x86_64 支持边界内，B00 必须明确记录为非官方平台并先证明可运行或停止修订。项目所有者在目标 Windows 以 Executor 运行身份本地注入 Binance Demo WinVault secret；只向计划提供 credential reference 的存在性与权限证据
  required_outputs:
    - 1.230.0 wheel filename、ABI、SHA-256、tag、commit、LGPL-3.0-or-later 文本和完整传递依赖 hash lock
    - 目标 Windows 干净安装/import、唯一 TradingNode 最小 start/stop/dispose、Controller add/start/stop/remove qualification fixture、pywin32 mutex、manual-reset/initial-false stop Event、保护 DACL/SID/权限断言和异常重启 smoke；真实跨 Task 身份停止留 B01，72 小时留 B04
    - DataClient+ExecutionClient 同节点、显式 WinVault 凭据注入、BINANCE_DEMO/LIVE profile 隔离、两 client 同 profile BinanceInstrumentProviderConfig（DEMO BTC+ETH、LIVE BTC、load_all=false、query_commission_rates=true），且 provider/DataEngine/Execution cache 都含精确 load_ids；无 event store/Redis/OrderEmulator/第二节点的 exact config digest
    - >-
      精确解析 source_1m=`{instrument_id}-1-MINUTE-LAST-EXTERNAL` 与 target_15m=`{instrument_id}-15-MINUTE-LAST-INTERNAL@1-MINUTE-EXTERNAL`；
      LiveDataEngineConfig 显式固定 left-open、timestamp-on-close、skip-first-non-full、no-empty-bars 与 validate-data-sequence；指标/handler 先注册，公开
      request_aggregated_bars 以 72h、limit=1500、无自定义 time-range 分段、include_external_data=true、update_subscriptions=true 预热，并证明 Binance adapter
      按 last open_time+1ms 分页。完成 callback 后无 yield 地依次 subscribe_bars(source_1m/target_15m)，并与 subscribe_mark_prices(Binance 1s mark stream)、
      subscribe_quote_ticks(bookTicker) 完成 start/stop/restart、断连重订阅、同事件 bid/ask 和 freshness smoke。证明双 bar 订阅只有一个底层 source subscription、
      15 根连续完整 1m 只生成一根可用 15m、缺一根不可用，且历史—实时边界与重启无缺口/异值重复；同时证明 validate-data-sequence 不代替同 timestamp 重复/冲突门禁，
      mark/quote 不形成第二 bar 源或全量持久行情
    - 固定源码/API 与黑盒矩阵：普通 open UUID、显式数量 algo open UUID、SUBMITTED_UNKNOWN 场所存在、明确 -2013 不存在、连续暂态 BinanceError、cache-open/query-missing、重启后新 per-activation adapter 对 EXTERNAL 技术订单的 query/cancel/terminal
    - inflight_check_interval_ms=0、open_check_interval_secs=10.0 与 open_check_open_only=true 的 exact config 生效；bulk-open 响应缺失只保持原技术状态、不进入 targeted missing resolution 或合成终态；提交结果未知持续超过组件原默认重试窗后，后来场所正向状态仍能按原 UUID 进入 cache、取消并取得终态
    - 上述矩阵证明 external_order_claims=None、启动/持仓技术核对、唯一 UUID 单订单 query、零写重试和可选同包 GET supplement 的唯一组合；任何组件 synthetic terminal 不能误作产品事实或封死原订单取消
    - generate_missing_orders=true 下，重启时已有净持仓且本地订单/成交历史缺失仍能按场所报告重建技术 cache，并由 RiskEngine 接受不超过同 cutoff 已核对数量的 reduce-only 退出；生成的 reconciliation projection 不得成为产品事实或触发动作
    - Cython DonchianChannel、AverageTrueRange(WILDER,use_previous=true) 按 channel_lookback_15m 的 min/default/max 精确 bars 输入、完成预热后无需等待实时积累即可判断、1m→精确 target_15m 聚合及缺口/边界/重启黄金向量；bar-only historical gateway 能以 BACKTEST_LAST_BAR_PROXY、BACKTEST_MANIFEST_FEE_PROXY 与 1–5x BACKTEST_MANIFEST_LEVERAGE_PROXY 实际形成 proposal、fill 与不含 funding 的 PnL，不因缺少 MARK/quote/实时 commission/leverage query 永久拒绝；不使用 Pyo3 同名 ATR 或自研指标
    - >-
      公开 BarDataWrangler、ParquetDataCatalog、Cython BacktestEngine、MakerTakerFeeModel、OneTickSlippageFillModel、LatencyModel、ReportProvider/statistics 的 exact import/config smoke；
      固定 wheel 源码与黑盒共同证明 Cython engine 不会结算 FundingRateUpdate，而 Rust/PyO3 engine 不接受同一 Cython HalphaStrategyAdapter；manifest/report 精确写入
      funding_model=NOT_MODELED 且历史净值不含 funding。不构造无效 MarkPriceUpdate/FundingRateUpdate，不增加资金费下载/映射脚本、第二策略 adapter、自研 funding/PnL 或 2.0 RC 依赖
    - 最小 qualification adapter+纯逻辑 fixture 在 live harness/backtest 产生同结构 StrategyProposal，且纯逻辑写 API 静态边界成立；fixture 直接演进为 B02 生产适配器契约测试，不建平行 throwaway runtime
    - UUID32 普通/算法订单身份与八个 P0 order profile 所需公开 API 的最小 Demo capability probe；完整产品 PendingAction/保护/控制链留 B03
    - 真实 Demo 组合 probe：部分成交形成一个或多个显式数量 reduce-only StopMarket 保护分片后，同时提交 TP1/TP2，覆盖不同提交顺序、TP 部分成交、stop/TP 竞态、兄弟撤单和显式市场退出；不得出现 -2022/-4118、反向仓位、保护不足或不可取消订单
    - get_cached_binance_http_client 公开路径、GET 白名单、普通/算法分页/限频/字段、/fapi/v1/commissionRate 实际 taker fee，以及 /fapi/v1/income 的 incomeType=FUNDING_FEE、symbol/startTime/endTime/page/limit、(incomeType,tranId) 去重、60 秒 cursor/restart、429/暂态失败 UNKNOWN 与保留窗口证明；provider fee-tier fallback 过滤、秘密日志扫描和无写方法暴露证明；只有高层 query 缺口实际存在时才启用
  pass_rule: >-
    全部输出可复现，且无需第二 Binance 写 adapter、自研指标/回放/撮合/核对、额外进程、数据库、记录族或持久 worker，才标记 QUALIFIED。
    任一必需身份、订单、组合 reduce-only 拓扑、字段、恢复、Windows 生命周期或 write-retry 无法关闭，或只能靠 closePosition、私有 patch、第二写 client/第二 adapter 拓扑才通过，则标记 REJECTED 并阻断 B01。
  failure_rule: 只形成新的 L4 组件选择修订提案；不得静默升级、启用 raw client/Binance SDK 写路径或恢复本轮删除的自研实现

construction_packages:
  B01:
    name: 固定构建、两进程基线、数据库与本地工作台
    depends_on: [B00=QUALIFIED]
    scope:
      - Python/npm hash locks、单一 BuildManifest、仓库结构与静态边界测试
      - PostgreSQL 16 个记录族的首个迁移、DEMO/LIVE 分库与 App/Executor/migration/backup 角色
      - pydantic-settings TOML、WinVault keyring、structlog 脱敏、Task Scheduler IgnoreNew、Executor Global mutex
      - FastAPI/Uvicorn 单 worker、React/MUI 路由、owner 登录、Session、CSRF、login limit 和 OpenAPI 生成客户端
      - Notification outbox/dispatcher、stdlib SMTP、pg_dump/restore 脚本；ParquetDataCatalog/原始证据目录、checksum、保留、删除、导出与重建契约
    exit_evidence:
      - 干净主机从锁安装并启动两进程；App 不含 Binance 能力，Executor 不含 UI/SMTP/owner secret
      - migration upgrade/downgrade、16 记录族计数、数据库断开 fail-closed、角色越权拒绝
      - 登录/登出/绝对过期/CSRF/Host/Origin/限速、日志脱敏、keyring 交叉拒绝与静态页面 smoke
      - Task XML、BuildManifest、静态 dist 与配置摘要漂移会阻断真实写
      - App Task、Executor Task 与登记维护身份跨 session 以精确 SID/DACL 创建、等待或 SetEvent；未授权本机身份 OpenEvent/SetEvent 被拒绝，无法解析 SID 或权限漂移会阻断启动/真实写
      - Python/npm 完整锁闭包许可证、归属、直接依赖替代责任、升级/退出与复杂度台账通过，并登记可重建文件型证据存储；不兼容或未知即阻断
  B02:
    name: 计划、策略、互斥额度与同一 live/backtest 适配器/纯逻辑
    depends_on: [B01]
    scope:
      - CodeStrategyDefinition 构建登记、JSON Schema、RJSF 参数表单和 ONE_SHOT_DONCHIAN_ATR_BREAKOUT
      - TradePlanDraft/Version、PlanActivation/Event、四种控制 Command/Receipt 和 Controller per-activation adapter 生命周期
      - AccountCapitalLimitVersion、MachineAuthorizationVersion、PlanAllocation、StopStateVersion 和 CAP Decimal 纯检查
      - 同一 HalphaStrategyAdapter+纯逻辑的 live gateway 与 BacktestEngine gateway；原生 Donchian/ATR 和 INTERNAL bar 聚合，无自研公式
    exit_evidence:
      - 草稿→固定→激活事务原子；多个 instrument 激活额度互斥；同 instrument 歧义拒绝
      - margin/notional 自然越界只禁增险；本激活损失口径与其他策略隔离；阈值锁存并请求全退出
      - 同一 bar/deadline 身份幂等、不同摘要冲突、错过窗口不补开仓、全平后不再入场
      - live/backtest StrategyProposal golden vectors 一致；纯逻辑直接写入口静态失败
  B03:
    name: 唯一场所写、保护、核对与用户控制
    depends_on: [B02]
    environment: Binance USDⓈ-M Demo only
    scope:
      - VenueFact、PendingAction 全状态、UUID32、两阶段 CAP、OrderFactory 与封闭 submit/cancel gateway
      - 八个 order profiles、逐成交显式数量保护分片、TP1/TP2、晚到成交、时间/损失/用户退出
      - HalphaCoordinator、启动/持仓 reconciliation、按已持久 UUID 单订单核对、unknown recovery、外部订单隔离和 closure digest
      - 停止新增风险、恢复新增风险、退出策略，以及用户接管冻结范围、官方风险减少/关闭事实核对和接管关闭
    exit_evidence:
      - historical_and_runtime_evidence.demo.required 全部通过
      - 四个崩溃窗口均不重复调用；SUBMITTED_UNKNOWN 只查询；保护 UNKNOWN 不为同一成交增量建立第二保护
      - first_fill 只由首次原子锁存的权威正成交决定；乱序 stream/query、后来到达但 venue time 更早的成交与重启重放均不改写冻结值，每个成交身份只形成一次保护或尾部清理

      - 授权 deadline 到期会撤销/核对全部开放普通和条件增险订单；到期—成交竞态及重启不会恢复授权、遗漏晚到成交或释放仍有入场责任的额度
      - 无持仓反转、无保护替换/OCO/market_exit、无 WriteControl/SubmissionAttempt/ProtectionTask/ReconciliationItem
      - 用户接管先冻结责任范围并持久化再停止 HalphaStrategyAdapter，节点继续只读核对；仅匹配范围的风险减少/关闭事实可帮助闭合，范围外活动或关闭证据不足不释放额度
  B04:
    name: 证据、完整工作台与运维闭环
    depends_on: [B03]
    scope:
      - 从 schema 合法范围冻结一组用户选择参数、方向和精确 manifest，执行 BacktestEngine development/holdout 与 ReportProvider 判定；默认值仅作初始建议
      - Binance Demo 完整策略周期和 BINANCE_LIVE_READ_ONLY 前向观察
      - 激活复核、运行时间线、三类控制及独立恢复命令、资本、通知、Review/ImprovementHandoff 页面；闭合后由 coordinator 幂等生成 Review
      - Windows 72 小时、邮件、备份恢复、浏览器、安全、可访问性和故障演练
    exit_evidence:
      - historical technical_safety_gate 与 Demo/前向/运维证据满足；精确 manifest 记录技术资格、完整绩效报告和 owner 是否接受，不以盈利阈值自动授权
      - SMTP 实际投递、ABANDONED 可见 Task、空库 pg_restore 与重启恢复通过
      - Playwright 覆盖激活、未知、保护 GAP、最大损失、退出、接管、闭合、复盘和 stale UI
      - 复杂度复点仍为 16 记录族、2 持久 worker、2 进程、1 DB product、1 write path
  B05:
    name: 首个有界真实交易闭环
    depends_on: [B04]
    environment: Binance USDⓈ-M LIVE_WRITE
    scope:
      - 用户在已资格 manifest、Demo profile 和证据规模内固定 BTCUSDT 一次激活的方向、参数与三轴额度
      - 从真实激活、市价入场、基础保护、分级止盈或时间/用户/损失退出，到核对、Review 和额度释放
    preconditions:
      - accepted_design_set 中全部候选已转为 ACCEPTED，B00–B04 全部通过且 BuildManifest/场所规则/费率/组件摘要无漂移
      - 用户验证真实 API 权限、账户模式、1x–5x 杠杆、SMTP、账户边界和本次三轴额度
      - 用户已阅读并明确接受该 manifest 的实际历史交易数、平均净 R、ProfitFactor、MaxDrawdown、样本不足与模型限制；该接受不构成盈利保证
      - entry/exit notional 不超过前向 top-of-book 第 5 百分位的 10%，也不超过证据 manifest 上限
      - UI 明示 REAL、止损与最大损失不是保证、三个控制后果和 Binance 官方界面接管路径
    acceptance:
      - 恰好一个真实入场周期；完全平仓后不再开仓
      - 每笔正成交均有唯一显式数量 reduce-only StopMarket 保护分片 WORKING，且不存在保护替换、同一成交重复保护或 closePosition 订单
      - 所有真实写有 PlanEvent、CAP、PendingAction 和 UUID32；无重复调用或无法解释外部责任
      - realized/unrealized/funding/commission 归属可复算；最大损失和三轴规则无违规
      - 场所查询形成 EXE closure_digest 后先完成 PlanActivation/CAP 释放；用户接管关闭可保留精确损益 UNKNOWN，但必须证明 Halpha 在途/未知动作已清零、场所净仓位和开放订单均为零且无范围外冲突；随后 Review 被幂等创建或留下明确可重试责任，Review 失败不回滚释放
    failure: 任一事实、保护、费用、资金费、写结果或闭合未知时不声称 P0 通过；保持退出/接管责任并停止后续真实激活

build_order: [D00, B00, B01, B02, B03, B04, B05]
parallelization_rule: 同一包内部可以并行测试和 UI，但不得越过依赖包的 exit evidence；B05 绝不与证据建设并行

owner_inputs_before_specific_gates:
  before_B00:
    - 实际目标 Windows edition、version、OS build、CPU 架构和运行账户
    - Binance USDⓈ-M Demo 账户和允许测试的 BTCUSDT/ETHUSDT；项目所有者以 Executor 运行身份把 API secret 本地注入 WinVault，只提供非秘密 credential reference 与权限证据
  before_B01:
    - 本机 PostgreSQL 安装位置、备份目录、App/Executor 计划任务账户和唯一登记的本机维护身份；提供三者非秘密 Windows SID 供保护 DACL 与跨 session 停止验收
    - owner 本机登录口令由离线命令现场设置，不写入文档
  before_B04:
    - Binance LIVE_READ_ONLY secret 由项目所有者以 Executor 运行身份本地注入 WinVault；只记录非秘密 credential reference 与固定出口 IP（若启用 allowlist）
    - SMTP host、port、TLS mode、sender、recipient 和非秘密 credential reference；SMTP secret 由项目所有者以 App 运行身份本地注入 WinVault
    - 历史证据初始权益、max_margin/max_notional/max_allowed_loss、1–5x BACKTEST_MANIFEST_LEVERAGE_PROXY 与最大真实 entry/exit notional 上限；B05 实际 isolated leverage 必须与获接受 manifest 一致
  before_B05:
    - Binance LIVE_WRITE secret 由项目所有者以 Executor 运行身份本地注入 WinVault；只记录非秘密 credential reference 与固定出口 IP（若启用 allowlist）
    - 当前账户模式、杠杆、taker fee、账户资本边界、本次三轴额度、方向和精确证据 manifest

p0_non_goals:
  - 多次自动循环开仓、组合优化、策略间资金竞争或自动额度调度
  - 同 instrument 多策略虚拟分仓、多账户、多场所、现货、COIN-M、期权、交叉保证金或 hedge mode
  - 策略 DSL、脚本上传、动态插件、参数优化平台、通用回测平台或 AI 实时交易决定
  - 高频、做市、订单簿/延迟套利、自动修改杠杆/模式、转账或提现
  - 专业行情终端、图表平台、多渠道通知、邮件命令、移动 App 或外网控制面
  - 机构审批、合规平台、微服务、消息总线、容器编排、热备、自动故障转移或 7x24 运维保证

definition_of_ready_to_start_p0:
  design_status: READY
  satisfied:
    - owner_decisions_accepted、accepted_design_set、本 L4 和 D00 已正式接受
    - 已知上位稳定语义冲突已显式记录并由项目所有者决定不阻断 P0；未声称跨层完全对齐
    - B00 的失败停止、无平行 fallback、第三方优先和复杂度硬上限已经接受
  remaining_runtime_inputs_before_B00:
    - 实际目标 Windows edition、version、OS build、CPU 架构和运行账户
    - Binance USDⓈ-M Demo credential reference 与允许测试的 BTCUSDT/ETHUSDT；秘密只由用户在目标 Windows 本地注入 WinVault
  first_step: >-
    收到上述非秘密目标信息并由用户本地完成 Demo secret 注入后，执行 B00；B00 QUALIFIED 前不建立生产真实写代码路径。
  current_assessment: >-
    P0 的核心建设方向和设计入口已经具备，设计审查在“基本无误”处停止。尚缺内容是开始 B00 所需的目标环境输入，
    不是待继续细化的设计缺陷；真实写保持 DISABLED。

