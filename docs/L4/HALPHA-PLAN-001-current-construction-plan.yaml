        parallel_strategy_or_execution_runtime_created: false
      performance_observation:
        development: {total_realized_pnl_usdt: '-122.45174686', average_net_r: '-0.007354459270870870870870870871', profit_factor: 0.732662920090256, win_rate: 0.4594594594594595}
        holdout: {total_realized_pnl_usdt: '-160.78263386', average_net_r: '-0.01468334555799086757990867580', profit_factor: 0.4433603246959269, win_rate: 0.3835616438356164}
        conclusion: 当前冻结参数在 development 与 holdout 均未显示正收益；该结果不阻断系统机制建设，但不得用作策略有效、真实资金权限或盈利保证
        limitation: funding_model=NOT_MODELED；bar、固定费率、单 tick 滑点、延迟和无订单簿流动性模型与 Demo/LIVE 存在差异
    no_optimization: P0 不做参数搜索、网格稳健性平台或从 holdout 选择最佳点；失败只能直接修订对应目标层级文档并重新接受，再使用未触及区间重新资格化
