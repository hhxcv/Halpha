  supported_directions: [LONG, SHORT]
  real_qualified_instrument: BTCUSDT-PERP
  purpose: 验证本地持续条件、市价入场、场所基础保护、分级止盈、时间/损失退出、核对和复盘闭环；不表达盈利保证
  lifecycle_contracts:
    plan_and_deadline: HALPHA-TRADEPLAN-002@v0.10.0#TRADEPLAN-AUTO-LIF-001
    capital_and_authorization: HALPHA-CAP-002@v1.2.0
    action_protection_and_closure: HALPHA-EXE-002@v1.2.0#EXE-AUTO-SUB-001、#EXE-AUTO-PROT-001、#EXE-AUTO-CLOSE-001-REQ
  user_parameters:
    direction: {type: enum, allowed: [LONG, SHORT], default: null}
    channel_lookback_15m: {type: integer, min: 20, max: 96, default: 20}
    confirmation_bars_1m: {type: integer, min: 1, max: 3, default: 2}
    initial_stop_atr_multiple: {type: decimal_string, min: '1.0', max: '3.0', default: '1.5'}
    max_entry_extension_atr: {type: decimal_string, min: '0.1', max: '1.0', default: '0.5'}
    take_profit_1_r: {type: decimal_string, min: '1.0', max: '3.0', default: '1.5'}
    take_profit_1_fraction: {type: decimal_string, min: '0.25', max: '0.75', default: '0.50'}
    take_profit_2_r: {type: decimal_string, min: '2.0', max: '6.0', default: '3.0'}
    max_hold_bars_15m: {type: integer, min: 4, max: 672, default: 96}
    entry_valid_minutes: {type: integer, min: 15, max: 10080, default: 1440}
  cross_constraints:
    - take_profit_2_r 必须严格大于 take_profit_1_r
  fixed_values:
    atr_period: 14
    atr_ma_type: WILDER
    atr_use_previous: true
    atr_value_floor: '0.0'
    indicator_input_bars_per_signal: channel_lookback_15m；其范围 20–96 已覆盖 ATR(period=14,use_previous=true) 的初始化需要
    risk_budget_fraction_of_max_allowed_loss: '0.80'
    entry_notional_buffer_rate: '0.0020'
    slippage_buffer_per_side: '0.0010'
    protection_trigger_price: LAST_PRICE（Binance CONTRACT_PRICE）；按 BacktestEngine 实际能力妥协，不自研 mark-price 触发撮合
  indicators:
    donchian: from nautilus_trader.indicators import DonchianChannel
    atr: from nautilus_trader.indicators import AverageTrueRange, MovingAverageType
    atr_constructor: AverageTrueRange(period=14, ma_type=MovingAverageType.WILDER, use_previous=True, value_floor=0.0)
    pyo3_exclusion: 不使用同名 Pyo3 ATR；B00 证明实际导入为公开 Cython 路径
    input_cutoff: >-

      每个候选信号以第一根确认 1m bar 的 interval_start 为截止点，取此前完整闭合 15m bars；新建两个原生指标，按时间升序分别喂入恰好
      channel_lookback_15m 根相同 bars，第一根接受原生 previous-close seed 语义。实时启动按 live_subscriptions 请求 72h source history，并先证明最近
      max(channel_lookback_15m, atr_period+1) 根 target_15m 完整连续；不得把目标指标数量直接当成 request_aggregated_bars 的 source limit。
    gap_behavior: 任一 1m/15m 缺失、重复、未闭合、乱序或 cutoff 不完整时不入场且停止该次判断；不自研补值
  entry:
    long: 最近 M 根连续完整闭合 1m 收盘均严格高于冻结 Donchian upper，且最后收盘不高于 upper + max_entry_extension_atr*ATR
    short: 最近 M 根连续完整闭合 1m 收盘均严格低于冻结 Donchian lower，且最后收盘不低于 lower - max_entry_extension_atr*ATR
    source_responsibility: HALPHA_MONITORED
    order_profile: ENTRY_MARKET
    freshness_seconds: 65
    pre_submit:
      live: 按 live_subscriptions.risk_increase_freshness 建立同一 pre_submit_cutoff，刷新并核对 mark、top-of-book、instrument rules、账户/持仓模式、逐工具 margin mode/leverage/实际费率、额度和授权；事实未知、过期、scope 不符或不再满足扩展上界时本次不提交
      backtest: 只消费 decision cutoff 已闭合且连续的 1m LAST bar close 代理、catalog instrument、内存 CAP 与授权；代理缺失或不连续时本次不提交，不伪造 MARK_PRICE/TOP_OF_BOOK VenueFact
  sizing:
    reference_price:
      live: LONG 使用 max(mark_price,best_ask)，SHORT 使用 max(mark_price,best_bid) 作为保守名义参考
      backtest: 使用 decision cutoff 最近一根完整闭合 1m LAST bar close，source=BACKTEST_LAST_BAR_PROXY；接受其不含盘口/mark 的模型差异，并继续应用 entry_notional_buffer_rate、手续费与双边滑点缓冲
    stop_distance: initial_stop_atr_multiple * trigger_atr
    risk_budget: max_allowed_loss * 0.80
    leverage:
      live: >-
        从同 cutoff 已核对 ACCOUNT_STATE 取得逐工具实际 margin mode 与正 actual_leverage；ISOLATED 按实际逐仓事实核算，CROSSED 使用逐仓等价内部额度核算，
        effective_leverage=min(actual_leverage,5)。不得只因实际为 CROSSED 或 actual_leverage>5 拒绝，也不得在 actual_leverage<5 时向上放大；事实未知、模式不在
        [ISOLATED,CROSSED]、杠杆非正或 effective_leverage 与证据 manifest 不符时不新增风险。
      backtest: >-
        使用 owner 在 B04 证据 manifest 中固定的 1–5x effective_leverage，source=BACKTEST_MANIFEST_LEVERAGE_PROXY；它只表示逐仓等价内部风险上限，不伪造成账户事实。
        B05 记录实际 margin mode 与 actual_leverage，并按相同公式所得 effective_leverage 与证据 manifest 一致；actual_leverage 原值不要求等于 manifest 代理值。
    fee_rate:
      live: 本次 StrategyProposal 后、pre_submit_cutoff 前从已资格化同包 GET /fapi/v1/commissionRate 取得实际 taker fee，并满足 ACCOUNT_STATE 5 秒最大年龄；Instrument fee-tier/查询回退值只作诊断，实际费率未知或过期时不新增风险
      backtest: 使用 manifest 固定 0.0006，source=BACKTEST_MANIFEST_FEE_PROXY，并与 MakerTakerFeeModel/Instrument taker_fee 完全一致；只表达保守模型成本，不伪造成 ACCOUNT_STATE 或实时实际费率
    quantity_candidates:
      - risk_budget / (stop_distance + reference_price*两边手续费与两边滑点缓冲)
      - max_notional / (reference_price*(1+entry_notional_buffer_rate))
      - max_margin * effective_leverage / (reference_price*(1+entry_notional_buffer_rate))
      - instrument MARKET_LOT_SIZE maxQty
    final_quantity: 取最小候选并按 stepSize 向下；低于 minQty/minNotional 则不入场，不向上取整
    authority: Halpha Decimal 纯函数；NautilusTrader instrument/RiskEngine 可以更保守拒绝，不能扩大数量
  execution_selection:
    first_fill_frozen_values: [first_fill_price, first_fill_time, trigger_atr, R, time_exit_due_at]
    protection_profile: PROTECTIVE_STOP_REDUCE_ONLY
    protection_gap_exit_deadline_seconds: 30
    take_profit_profiles: [TAKE_PROFIT_1, TAKE_PROFIT_2]
    exit_profile: REDUCE_OR_CLOSE_MARKET
    unsupported: [protection replacement, OCO, trailing stop, break-even stop move, framework market_exit]
    stable_contracts:
      - HALPHA-EXE-002@v1.2.0#EXE-AUTO-PROT-001
      - HALPHA-EXE-002@v1.2.0#EXE-AUTO-TP-001-REQ
      - HALPHA-EXE-002@v1.2.0#EXE-AUTO-CLOSE-001-REQ
      - HALPHA-OUT-002@v0.8.0#OUT-RT-RCV-001-REQ
    note: 本节只选择当前参数与 order profile，不复制首次成交、晚到成交、保护、止盈、退出、接管、闭环或复盘恢复状态机

