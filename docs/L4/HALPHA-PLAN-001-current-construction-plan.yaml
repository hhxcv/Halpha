value_decision_gate:
  id: V01
  kind: POST_P0_OWNER_VALUE_DECISION
  status: NOT_STARTED
  depends_on: [B05]
  normative_sources: [HALPHA-CON-001@v2.11.0#CON-ECO-002, HALPHA-CON-001@v2.11.0#CON-ECO-003, HALPHA-OUT-001@v1.5.0#OUT-VAL-001]
  purpose: B05 结束后由项目所有者决定继续、继续收集证据、收缩、替换策略或停止项目；不自动提高资金、范围或真实写权限
  required_inputs:
    - B05 技术正确性、开放责任和完整 Review
    - 相对现金、明确基准和用户原工作方式的有限证据
    - 费用、资金费、滑点、数据、建设、运行和维护成本
    - 用户注意力、接管负担、故障恢复体验、样本数量与观察周期
  insufficient_evidence_result: EVIDENCE_INSUFFICIENT；单次盈利、一次闭环、代码完成或功能正确不得自动决定继续或扩资
  implementation_limit: 复用现有证据、Review 与用户决定；P0 不建立跨激活统计平台、自动评价流程或新记录族

build_order: [D00, B00, B01, B02, B03, B04, B05]
research_build_order: [R00, R01, R02, R03]
post_p0_decision_order: [B05, V01]
currently_authorized_work: [B04, R00]
parallelization_rule: >-
  B01–B03 已完成；B04 当前实施历史/Demo/LIVE_READ_ONLY 证据、完整工作台和运维闭环，B05 继续按前序包完成及 exit evidence 推进。
  R00 已获授权且不再依赖 B04 完成，但只有本 ACCEPTED 计划进入干净 Git 基线、R00 绑定 base_revision 并冻结完整包契约后才可开始；之后可通过独立 worktree/branch 与 B04/B05 包级并行。
  R01 可在 R00 完成后开始非确认性建设，但完成、research_policy 冻结和 confirmation_eligible_not_before 固定必须等待 B04 最终数据边界，R02 再按 R01 完成与政策冻结推进。
  R00–R02 不改变 B01–B05、P0 build_order 或三项真实写门。B05 冻结 BuildManifest 后研究变更不得合入该产品基线，至少等待 B05 完成与 V01 决定；资源隔离未资格化且
  runtime_real_write_gate=OPEN 时研究计算必须 PAUSED/STOPPED。B00 资格证据保留，账户实际持仓模式、保证金模式和杠杆不是 P0 建设阻断项；真实写工程能力、B05 授权和运行时真实写门继续分别 fail closed。

owner_inputs_before_specific_gates:
  before_B00:
    - 实际目标 Windows edition、version、OS build、CPU 架构和运行账户
    - Binance USDⓈ-M Demo 账户和允许测试的 BTCUSDT/ETHUSDT；项目所有者以 Executor 运行身份把 API secret 本地注入 WinVault，只提供非秘密 credential reference 与权限证据
  before_B01:
    - 本机 PostgreSQL 安装位置、备份目录、App/Executor 计划任务账户和唯一登记的本机维护身份；提供三者非秘密 Windows SID 供保护 DACL 与跨 session 停止验收
    - owner 本机登录口令由离线命令现场设置，不写入文档
  before_B04:
    - Binance LIVE_READ_ONLY 不使用 API secret 或账户身份；只允许可选本机网络代理引用，代理值仍仅存在于 WinVault/运行参数且不进入仓库或证据
    - SMTP host、port、TLS mode、sender、recipient 和非秘密 credential reference；SMTP secret 由项目所有者以 App 运行身份本地注入 WinVault
    - 历史证据初始权益、max_margin/max_notional/max_allowed_loss、1–5x 逐仓等价 BACKTEST_MANIFEST_LEVERAGE_PROXY 与最大真实 entry/exit notional 上限；B05 按实际 margin mode/leverage 计算的 effective_leverage 必须与获接受 manifest 一致，actual_leverage 原值无需相等
  before_B05:
    - Binance LIVE_WRITE secret 由项目所有者以 Executor 运行身份本地注入 WinVault；只记录非秘密 credential reference 与固定出口 IP（若启用 allowlist）
    - 当前 one-way/single-asset、逐工具实际 margin mode、actual_leverage、effective_leverage、taker fee、账户资本边界、本次三轴额度、方向和精确证据 manifest

p0_non_goals:
  - 多次自动循环开仓、组合优化、策略间资金竞争或自动额度调度
  - 同 instrument 多策略虚拟分仓、多账户、多场所、现货、COIN-M、期权或 hedge mode
  - 场所资金隔离保证、把 ISOLATED 反向当作 CROSSED，或把实际低杠杆向上放大
  - 策略 DSL、脚本上传、动态插件、参数优化平台、通用回测平台或 AI 实时交易决定
  - 高频、做市、订单簿/延迟套利、自动修改杠杆/模式、转账或提现
  - 专业行情终端、图表平台、多渠道通知、邮件命令、移动 App 或外网控制面
  - 机构审批、合规平台、微服务、消息总线、容器编排、热备、自动故障转移或 7x24 运维保证
  - 长期严格证据 AUTO_CONTINUE 恢复引擎；P0 只实现 MANUAL_PLAN_RESUME

definition_of_ready_to_start_p0:
  design_status: READY
  satisfied:
    - B00 的失败停止、无平行 fallback、第三方优先和复杂度硬上限已经记录
    - B00 汇总证据证明 14/14 required outputs 全部 QUALIFIED；目标账户实际 CROSSED/20x 按 accepted compatibility 得到 effective_leverage=5，不阻断
    - runtime_real_write_gate=CLOSED；工程资格、B05 包授权与运行时真实写门已拆分记录
    - D00 已接受 DEMO/LIVE 统一 EXE ExecutionAction、环境限定 CAP 和系统机制验证优先的协调版本集
  blocking: []
  remaining_runtime_inputs_before_B00: []
  first_step: 继续 B04；并在本 ACCEPTED 计划形成干净 Git 基线、绑定 R00 base_revision 与其余输入身份后，以独立 worktree/branch 开始 R00，不等待 B04 完成；两轨均不得建立 LIVE 写动作、装载 LIVE 写凭据或打开真实写门
  current_assessment: >-
    P0 当前已完成 B01–B03，B04 正在实施证据、完整工作台与运维闭环，仍不具备真实交易资格。Windows 10 和 B00 的目标主机、固定 wheel、Demo 行情/订单/恢复与生命周期证据仍有效；
    账户实际 CROSSED/20x 不阻断建设，按 accepted CAP 兼容边界只读处理。live_write_build_capability=NOT_QUALIFIED、b05_package_eligibility=NOT_AUTHORIZED、runtime_real_write_gate=CLOSED。

