    physical_record_family_count: 16
    stable_owner: HALPHA-SYS-002@v0.9.0#SYS-AUTO-SCH-001
    current_selection: B01 迁移实现该 ACCEPTED 记录族集合；本计划不复制记录清单、字段归属或嵌入规则
  durable_workers:
    stable_owner: HALPHA-SYS-002@v0.9.0#SYS-AUTO-WORK-001
    current_selection:
      - name: HalphaCoordinator
        process: halpha-executor
      - name: NotificationDispatcher
        process: halpha-app
  no_hidden_worker_rule: >-
    框架订阅、K 线、timer、指标、Controller、reconciliation、HTTP 请求处理、查询投影、OUT 归集和 pg_dump 不得取得独立 Halpha
    checkpoint、claim、due、退避或恢复生命周期；出现即重新计数并使复杂度门失败。
  result: >-
    结构复杂度由 26→16 个物理记录族、5→2 类持久 worker，且进程、数据库产品、授权路径、场所写路径和发布组均不增加。
    这只能证明结构维度下降；B00/B01 还必须用依赖、薄适配、配置所有者、许可证、升级、退出、测试和运维台账证明全生命周期复杂度不高于修订前，否则组件选择或本计划不得通过。

runtime_architecture:
  business_module_contract: HALPHA-SYS-002@v0.9.0#SYS-AUTO-BND-001
  authoritative_database: PostgreSQL 17.10
  logical_database_rule: DEMO 与 LIVE 使用独立数据库、角色、配置和凭据；可以位于同一 PostgreSQL 实例
  processes:
    halpha_app:
      owns:
        - FastAPI 本地 UI/API、静态前端与同进程服务端 /operations 有限入口
        - owner 身份、Session、CSRF、Command/Receipt 与查询投影
        - 计划固定和激活事务
        - NotificationDispatcher 与 SMTP
      forbidden:
        - Binance 凭据或连接
        - TradingNode、行情订阅、条件评价或真实写方法
    halpha_executor:
      owns:
        - 唯一 NautilusTrader TradingNode
        - 同一节点内按 profile 装载 Binance DataClient；仅 DEMO/LIVE_WRITE 装载 ExecutionClient
        - Controller 及每个未闭合且非 USER_TAKEOVER 的 PlanActivation 一个 HalphaStrategyAdapter 与一个纯策略逻辑对象
        - 唯一 HalphaCoordinator
        - 当前 profile 所需的唯一 Binance 凭据、VenueFact 与 EXE 所有的环境限定 ExecutionAction 路径
      forbidden:
        - UI、SMTP、owner 密码或第二 TradingNode
        - 第二 Binance SDK 写适配器、raw HTTP/WebSocket 写路径、框架 event store 或 Redis cache
  environment_profile:
    defined_profiles: [BINANCE_DEMO, BINANCE_LIVE_READ_ONLY, BINANCE_LIVE_WRITE]
    release_group: DEMO/LIVE_WRITE 产品实例的 App 与 Executor 必须作为同一发布组装载同一 profile、环境数据库与 BuildManifest/config digest；不允许页面/命令和执行器指向不同环境。BINANCE_LIVE_READ_ONLY 是无 App、通知或产品数据库的 Executor-only 资格化 composition
    concurrency: 一次只装载一个 profile；LIVE_READ_ONLY 开始前必须停止 DEMO/LIVE_WRITE 的 App+Executor 组，绝不并发连接两个环境
    write_capability:
      BINANCE_DEMO: B00 只允许隔离 qualification fixture 按 required_outputs 执行最窄 Demo 提交/查询/撤销与组合探针，不装载产品运行时、不形成产品记录或开放业务责任；产品 Demo 写仍仅在 B03 及以后按已通过 B00 的建设包启用
      BINANCE_LIVE_READ_ONLY: authority_class 固定 NO_TRADING_AUTHORITY，profile 禁止配置、解析或注入 Binance 凭据并关闭账户佣金查询，composition 不含 CAP/EXE 或私有已持久动作门；只从公开行情产生 preview/资格证据，不建立任何环境执行动作
      BINANCE_LIVE_WRITE: 仅 runtime_real_write_gate=OPEN 时启用；该门由治理 validator 强制绑定 D00/B00/B01–B04、工程能力、B05 AUTHORIZED+IN_PROGRESS 和完整用户/资本/manifest 引用
    switch_selection:
      hot_switch: false
      automatic_fallback: false
      stable_contracts: [HALPHA-SYS-002@v0.9.0, HALPHA-EXE-002@v1.2.0, HALPHA-CAP-002@v1.2.0]
  production_ports:
    web: 127.0.0.1 only
    database: local or owner-approved private host only
    inbound_external: none
  action_path_contracts:
    status: ALIGNED
    planning: HALPHA-TRADEPLAN-002@v0.10.0#TRADEPLAN-AUTO-SUM-001
    capital: HALPHA-CAP-002@v1.2.0
    execution: HALPHA-EXE-002@v1.2.0#EXE-AUTO-SUM-001、#EXE-AUTO-SUB-001
    current_topology: 单一 halpha-executor、单一 TradingNode、同一 active profile；DEMO/LIVE 共用同一 EXE 实现并分别实例化，精确组件接线与 profile 写能力由本节其他配置固定
  direct_write_guard_contract: HALPHA-ENG-002@v0.8.0#ENG-AUTO-NTL-001-REQ

p0_recovery_selection:
  policy: MANUAL_PLAN_RESUME
  stable_contracts:
    - HALPHA-TRADEPLAN-002@v0.10.0#TRADEPLAN-AUTO-LIF-001
    - HALPHA-EXE-002@v1.2.0#EXE-AUTO-HO-001
    - HALPHA-SYS-002@v0.9.0#SYS-AUTO-REC-001-REQ
    - HALPHA-ENG-002@v0.8.0#ENG-AUTO-BLD-001-REQ
  current_limit: 长期 AUTO_CONTINUE 不在 P0；B05 的当前在线要求由 construction_packages.B05.preconditions 记录
  evidence_horizon: B02 验证暂停/命令边界，B03 验证动作恢复，B04 验证 Windows 故障链；本计划不复制状态、命令或失败规则

component_selection:
  selected_at: 2026-07-16
  quant_stack:
    nautilus_trader:
      version: 1.230.0
      source_tag: v1.230.0
      source_commit: 8160730c7c550480b0a439fb11086a4c4de15f0b
      license: LGPL-3.0-or-later
      status: QUALIFIED_FOR_P0_SCOPE_BY_B00
      use:
        - 唯一实时 TradingNode、Binance 数据/执行适配器、instrument、订单模型、事件、K 线、timer 和指标
        - Controller 管理每个未闭合且非 USER_TAKEOVER 激活一个 HalphaStrategyAdapter；适配器组合不继承 Strategy 的纯策略逻辑
        - 启动 reconciliation、场所执行事件、持续 position reconciliation 与 Cache/Portfolio/RiskEngine 技术投影；已持久 UUID32 的持续订单核对使用组件公开单订单 query
        - 唯一历史 BacktestEngine、撮合/费用/滑点/延迟模型、ReportProvider 与内置统计
      accepted_differences:
        - ATR、Donchian、K 线和 timer 采用该固定版本的真实语义，不保留 Halpha 平行公式或状态机
        - Portfolio 与 RiskEngine 使用框架数值，但只作技术防错；Halpha Decimal 仍拥有额度、损失和身份摘要
        - Strategy 内存生命周期不作恢复权威；产品状态按 accepted TRADEPLAN/EXE/SYS 契约持久化，L4 不复制记录或恢复规则
      prohibited:
        - event store、Redis、persistent cache、OrderEmulator、bracket/OCO 和内部自动派生真实动作
        - 自动写重试、把技术 external claim 当业务归属、直接纯策略逻辑写入和第二量化栈
      artifact: nautilus_trader-1.230.0-cp313-cp313-win_amd64.whl
      artifact_sha256: 8817c46dc34e0aafc606948aacf1dd0fbbe1a31273c8a2f20983cf4ab2ddeef1
      artifact_qualification: B00 已从官方索引核对 filename、ABI、SHA-256、tag/commit、许可证与完整传递依赖锁
      windows_precision_mode: standard precision（64-bit raw fixed-point，最多 9 位小数）；P0 不引入高精度第二构建
      platform_caveat: NautilusTrader 1.230.0 官方 Windows 支持边界为 Windows Server 2022+ x86_64 与 Python 3.12–3.14；目标 Windows 10 Pro 22H2 位于声明边界外。B00 已在本机资格化当前切片，但不把该证据扩大为官方支持或长期生产保证；B01/B04 仍须完成产品任务身份和 72 小时证据
  backend:
    python: 3.13.14
    python_environment:
      implementation: Python 标准库 venv
      base_interpreter: 'D:\Environment\python313\python.exe'
      repository_path: .venv
      effective_from: 2026-07-16
      rules:
        - 基础解释器只用于创建或重建仓库根目录 .venv；依赖安装、资格化、测试、构建和运行命令必须使用 .venv\Scripts\python.exe
        - 创建时不得启用 system-site-packages 或自动升级依赖；.venv 不进入版本控制、BuildManifest 或发布制品
        - 运行入口必须验证 Python 精确版本为 3.13.14、sys.prefix != sys.base_prefix 且解释器位于当前仓库 .venv；任一不满足即失败停止
        - 不使用全局 pip 安装 Halpha 依赖；重建只从固定输入和带 hashes 的完整锁执行
    fastapi: 0.139.0

    uvicorn: 0.51.0
    starlette: 1.3.1
    itsdangerous: 2.2.0
    pydantic: 2.13.4
    pydantic_settings: 2.14.2
    sqlalchemy: 2.0.51
    alembic: 1.18.5
    psycopg: 3.3.4
    psycopg_binary: 3.3.4
    keyring: 25.7.0
    pywin32: 312
    pwdlib_argon2_extra: pwdlib[argon2]==0.3.0
    argon2_cffi_locked_transitive_candidate: 25.1.0
    asgi_csrf: 0.11
    limits: 5.8.0
    structlog: 26.1.0
    uses:
      - FastAPI/Starlette 提供本地 API、SessionMiddleware、TrustedHostMiddleware 与同进程服务端 `/operations` HTML；有限入口不依赖 Node/Vite/React 静态制品
      - Pydantic/pydantic-settings 提供请求、领域边界和 TOML 配置校验
      - SQLAlchemy/Alembic/psycopg 提供唯一 PostgreSQL 模型、迁移、事务与锁
      - pwdlib[argon2] 的 PasswordHash.recommended() 使用 Argon2；asgi-csrf 提供签名双提交；limits 的 FixedWindowRateLimiter+MemoryStorage 提供内存登录限速
      - Halpha 自有事件由 structlog 与标准库 TimedRotatingFileHandler 输出；NautilusTrader 内部日志使用其 LoggingConfig JSON 和原生大小轮转，不包装或重写框架 logger
      - keyring 固定 Windows WinVault backend；pywin32 提供 Global 命名互斥体
      - 标准库 Decimal、uuid、hashlib、json、smtplib、email 和 ssl 分别承担精确业务数值、身份摘要及邮件
  database:
    postgresql: 17.10
    backup_tools: 固定同版本 pg_dump 与 pg_restore
    isolation: READ COMMITTED、显式 SELECT FOR UPDATE、唯一约束和 expected-version CAS
  frontend:
    node: 24.18.0 LTS
    react: 19.2.7
    react_dom: 19.2.7
    types_react: 19.2.17
    types_react_dom: 19.2.3
    typescript: 5.9.3；按 openapi-typescript 7.13.0 的 TypeScript ^5 peer contract 妥协，不使用 7.x
    types_node: 24.10.13
    vite: 8.1.4
    vite_plugin_react: 6.0.3
    mui_material: 9.2.0
    mui_icons_material: 9.2.0
    emotion_react: 11.14.0
    emotion_styled: 11.14.1
    rjsf_core: 6.6.2
    rjsf_mui: 6.6.2
    rjsf_validator_ajv8: 6.6.2
    rjsf_utils: 6.6.2
    ajv: 8.20.0；只在构建/测试时把服务端 JSON Schema 2020-12 预编译为 CSP-safe 校验器，不进入浏览器运行时编译路径
    react_router: 8.2.0
    tanstack_react_query: 5.101.2
    openapi_typescript: 7.13.0
    openapi_fetch: 0.17.0
    uses:
      - MUI 提供布局、表格、表单控件、对话框和状态组件；P0 不自建通用组件库
      - RJSF MUI 使用构建期 AJV 2020-12 预编译校验器从策略 JSON Schema 生成参数表单；浏览器严格 CSP 下不执行动态代码生成，运行时服务端 schema 与构建 schema 不一致即失败停止；只自定义 Decimal 字符串 widget 和领域跨字段错误
      - React Router 提供稳定路由；TanStack Query 只做内存查询、轮询和 stale 展示，不持久化、不离线执行命令
      - openapi-typescript/openapi-fetch 从 FastAPI OpenAPI 生成类型与客户端；不手写平行 DTO/HTTP client
      - 生产只部署 Vite 静态 dist，由单 worker halpha-app 提供；不运行 Node/Vite server
      - "`/operations` 随同一 halpha-app 后端制品发布并服务端渲染，复用同一认证、CSRF、Command/Receipt 和领域处理器；不是第二前端应用"
  testing_and_locking:
    pip: 26.1.2
    pyyaml: 6.0.3；只供仓库 YAML/文档机械校验，不进入 Halpha 运行依赖
    pytest: 9.1.1
    hypothesis: 6.156.6
    pip_tools: 7.5.3
    vitest: 4.1.10
    playwright: 1.61.1
    axe_core_playwright: 4.12.1
    python_lock: pip-tools 生成带 hashes 的全闭包锁；部署使用 pip --require-hashes
    javascript_lock: package-lock.json 与 npm ci；禁止浮动 semver
    license_gate:
      known_non_mit_bsd: [NautilusTrader LGPL-3.0-or-later, psycopg/psycopg-binary LGPL-3.0-only, Hypothesis MPL-2.0, axe-core-playwright MPL-2.0, TypeScript/Playwright/RJSF/asgi-csrf Apache-2.0]
      rule: B01 必须从 Python/npm 全闭包锁生成许可证与必要归属报告；未知、冲突或发布义务未满足时阻断，不以本计划清单代替锁闭包
  explicitly_not_selected:
    - raw httpx/websockets 或 Binance SDK 写适配器
    - vectorbt、backtrader、QuantStats、empyrical 或第二回测/统计栈
    - APScheduler、Celery、Procrastinate、Temporal、通用 retry 库或持久 job 框架
    - transitions、python-statemachine 或第二业务状态机
    - Redis、Kafka、RabbitMQ、Docker、Kubernetes、微服务或热备
    - MUI X、TanStack Table、图表库、专业行情终端或策略代码编辑器
    - aiosmtplib、WinSW、NSSM、pgBackRest、Barman 或 PITR 平台

runtime_configuration:
  config_file: config/halpha.toml
  config_loader:
    implementation: pydantic-settings TOML settings source
    enabled_sources: [explicit_toml, explicit_constructor_values]
    disabled_sources: [environment, dotenv, file_secret]
    secret_rule: TOML 只保存稳定 keyring reference，不保存秘密值
  build_manifest:
    binds:
      - Python 与 npm 全闭包锁及 artifact hashes
      - 数据库 schema version 与迁移 head
      - Halpha 仓库 source revision/commit 与干净构建输入摘要
      - 前端静态 dist digest
      - Strategy registry、代码与参数 schema digest
      - NautilusTrader wheel、非秘密配置和 B00 qualification digest
      - Task Scheduler XML、非秘密 runtime profile 和 credential-reference digest
    startup_rule: 任一摘要漂移时 Executor 保持真实写禁用；不得运行时接受浮动依赖或未知配置
  nautilus_trader:
    topology:
      trading_nodes_per_executor: 1
      data_clients: 1 Binance client for active profile
      execution_clients: 1 Binance client for active profile
      controller: enabled
      adapter_instances: >-
        one HalphaStrategyAdapter per 未闭合且未进入 USER_TAKEOVER 的 PlanActivation（至少覆盖 RUNNING、EXITING 与 UNKNOWN）；
        USER_TAKEOVER 持久化后停止并移除对应 adapter
      strategy_id: 由 activation_id 稳定派生；产品归属规则按 HALPHA-DAT-002/HALPHA-EXE-002，框架 StrategyId 不能单独证明归属
    TradingNodeConfig:
      environment: LIVE（Nautilus kernel 环境；Binance Demo/Live 由 client environment 区分）
      cache: null（只使用进程内 cache，不配置 backing database）
      message_bus: null（只使用进程内 message bus）
      emulator: null
      load_state: false
      save_state: false
      catalogs: []
      streaming: null
    LiveDataEngineConfig:
      time_bars_interval_type: left-open
      time_bars_timestamp_on_close: true
      time_bars_skip_first_non_full_bar: true
      time_bars_build_with_no_updates: false
      validate_data_sequence: true
      validation_limit: validate_data_sequence 只拒绝严格倒退的 ts_event；同时间重复或异值冲突仍由 Halpha 连续性门禁阻断
      continuity_rule: "`{instrument_id}-15-MINUTE-LAST-INTERNAL@1-MINUTE-EXTERNAL` 只有恰好覆盖 15 根连续完整 source bars 才可供策略使用；缺一根即 ConditionJudgement UNKNOWN，不以空 bar 填补"
    LiveExecEngineConfig:
      reconciliation: true
      reconciliation_lookback_mins: null
      reconciliation_instrument_ids:
        BINANCE_DEMO: [BTCUSDT-PERP.BINANCE, ETHUSDT-PERP.BINANCE]
        BINANCE_LIVE_READ_ONLY: [BTCUSDT-PERP.BINANCE]
        BINANCE_LIVE_WRITE: [BTCUSDT-PERP.BINANCE]
      reconciliation_startup_delay_secs: 10.0
      inflight_check_interval_ms: 0

      inflight_check_threshold_ms: 5000（interval=0 时不启用）
      inflight_check_retries: 5（interval=0 时不启用）
      open_check_interval_secs: 10.0
      open_check_open_only: true
      open_check_lookback_mins: 60
      open_check_threshold_ms: 5000（open_only=true 时，批量开放订单响应缺失会直接返回，不进入单订单缺失解析）
      open_check_missing_retries: 5（open_only=true 时不用于缺失订单）
      position_check_interval_secs: 60.0
      position_check_lookback_mins: 60
      position_check_retries: 3
      generate_missing_orders: true
      generated_reconciliation_projection: enabled for in-memory technical cache rebuild
      order_timer_selection_reason: B00 已证明 inflight timer 的合成终态风险，故关闭；open timer 仅保留 open-only 正向更新
      product_projection_and_unknown_contract: HALPHA-DAT-002@v0.8.0、HALPHA-EXE-002@v1.2.0
      filter_unclaimed_external_orders: false
      filter_position_reports: false
    StrategyConfig:
      manage_stop: false
      manage_contingent_orders: false
      manage_gtd_expiry: false
      external_order_claims: null
      recovery_entrypoints: [Strategy.query_order, Strategy.query_account, private persisted-action cancel gate]
      recovery_contract: HALPHA-EXE-002@v1.2.0#EXE-AUTO-REC-001、#EXE-AUTO-HO-001；L4 只固定上述组件入口和 external_order_claims=null
      qualification_status: B00_QUALIFIED
      prohibited_compromise: 不允许每 activation 注册 instrument claim，因为固定版本没有公开 deregister；若无 claim 路径失败，当前方案 REJECTED，任何替代拓扑都必须直接修订对应目标层级文档并重新评审接受，不在当前运行时保留双拓扑
    BinanceInstrumentProviderConfig:
      load_all: false
      load_ids:
        BINANCE_DEMO: [BTCUSDT-PERP.BINANCE, ETHUSDT-PERP.BINANCE]
        BINANCE_LIVE_READ_ONLY: [BTCUSDT-PERP.BINANCE]
        BINANCE_LIVE_WRITE: [BTCUSDT-PERP.BINANCE]
      query_commission_rates: {BINANCE_DEMO: true, BINANCE_LIVE_READ_ONLY: false, BINANCE_LIVE_WRITE: true}
      binding: DEMO/LIVE_WRITE 的 DataClient 与 ExecutionClient 必须绑定同一 active profile 的上述精确配置和值摘要；LIVE_READ_ONLY 只有同一 DataClient/provider。reconciliation_instrument_ids 只限制写 profile 核对范围，不能代替 instrument provider 加载
      failure: 任一 load_id 未进入该 profile 实际装载的 InstrumentProvider/DataEngine/Execution cache 时阻断；写 profile 的 query_commission_rates 结果只用于框架技术估算，因为固定版本查询失败会回退 fee-tier table 且不公开回退标志，不能据此证明实际费率；LIVE_READ_ONLY 不发起该账户查询
      actual_fee_boundary: 增险 sizing 所需实际 taker fee 只从已资格化的同包 GET /fapi/v1/commissionRate supplement 取得并映射为带 instrument/cutoff 的 ACCOUNT_STATE；缺失、过期或查询失败即不新增风险，不引入第二 client
    BinanceDataClientConfig:
      account_type: USDT_FUTURES
      environment: active profile explicit DEMO or LIVE
      credential_binding: DEMO/LIVE_WRITE 使用各自 WinVault 凭据；BINANCE_LIVE_READ_ONLY 固定 api_key/api_secret=null，配置或运行时出现 Binance 凭据即拒绝
      instrument_provider: active profile BinanceInstrumentProviderConfig
      subscriptions: 按 p0_data_and_adapter_selection.live_subscriptions，由适配器生命周期建立和恢复
      persistence_contract: HALPHA-DAT-002@v0.8.0；当前不保存全量流或建立行情库
      credentials: 从 Executor 身份 WinVault reference 读取并显式注入 api_key/api_secret；缺失即阻断，绝不让 factory 回退环境变量
    BinanceExecClientConfig:
      account_type: USDT_FUTURES
      environment: active profile explicit DEMO or LIVE
      instrument_provider: 与 DataClient 完全相同的 active profile BinanceInstrumentProviderConfig
      credentials: 与同 profile DataClient 共用显式 WinVault 解析值；秘密不进入 TOML、摘要或日志
      use_reduce_only: true
      use_position_ids: true
      use_trade_lite: false
      treat_expired_as_canceled: false
      recv_window_ms: 5000
      max_retries: null
      futures_leverages: null
      futures_margin_types: null
      transport_compromise: 固定版本 Python config 不公开 use_ws_trading 字段；接受组件实际传输，仅资格化动作身份、零写重试和失败语义，不自研第二传输
    automatic_write_retry: disabled；max_retries=null 在固定源码写 RetryManager 路径等价 0 次，但 status query 内部仍有 3 次读取尝试，二者不得混淆
    product_result_contract: HALPHA-EXE-002@v1.2.0；核对投影、UNKNOWN、产品终态、原身份查询与禁止重复 submit 的稳定语义不在 L4 复制
    exact_config_digest: 由 build/qualification/b00-qualification-latest.json 固定 B00 配置证据；B01 BuildManifest 再绑定产品构建摘要
  numeric_contract:
    normative_source: HALPHA-ENG-002@v0.8.0#ENG-AUTO-NTL-003-REQ
    current_implementation: Python Decimal、PostgreSQL NUMERIC 与 NautilusTrader 原生数值边界
    qualification_status: B00_QUALIFIED；B02/B03 按建设包 exit_evidence 继续验证当前实现，不在 L4 复制数值、摘要、量化或失败规则
  database:
    transaction_isolation: READ COMMITTED
    claim_pattern: SQLAlchemy with_for_update(skip_locked=True) 只由 HalphaCoordinator 或 NotificationDispatcher 使用
    concurrency: stable lock order + unique constraint + expected state_version CAS
    unavailable_contract: HALPHA-SYS-002@v0.9.0、HALPHA-ENG-002@v0.8.0；数据库不可用失败语义不在 L4 复制
  logging:
    halpha_events:
      format: structlog JSON Lines
      rotation: 标准库 TimedRotatingFileHandler 每日轮换，保留 14 天
      redaction: API secret、password/hash、session/csrf secret、SMTP secret、cookie、Authorization、数据库密码和原始 credential value
    nautilus_internal:
      implementation: NautilusTrader LoggingConfig；不接入 structlog processor、不写 logger wrapper
      config: {log_level: INFO, log_level_file: INFO, log_file_format: JSON, log_file_max_size: 104857600, log_file_max_backup_count: 5, print_config: false}
      accepted_compromise: 使用组件原生大小/份数轮转，不要求按日；B00 secret scan 发现泄密则阻断该构建，不以自研 logger 接管
    audit_identity: Halpha 自有日志记录稳定业务 identity、reason code、cutoff、build digest 和 state version；任何日志均不是业务事实权威

security_and_operations:
  web:
    bind: 127.0.0.1
    uvicorn_workers: 1
    reload: false
    trusted_hosts: [127.0.0.1, localhost]
    cors: disabled
    owner_accounts: 1
    password_setup: 离线 halpha-auth set-password 命令，两次输入；无 Web 首次认领、邮件重置或安全问题
    password_hash: pwdlib PasswordHash.recommended() 的组件默认 Argon2 profile；不自定义算法或参数，升级组件时再做兼容验证
    session:
      implementation: Starlette SessionMiddleware
      cookie_name: halpha_owner_session
      contents: owner marker、固定 issued_at 和随机 session id；不得含秘密或权限状态
      absolute_lifetime_seconds: 1800
      same_site: strict
      http_only: true
      secure: false，仅因仅监听本机 HTTP；若未来开放网络必须先改为 HTTPS 新设计
      expiry_rule: 每次请求服务端校验初始 issued_at；活动不滑动延长
    csrf:
      implementation: asgi-csrf 签名双提交 cookie
      signing_secret: 从 App 身份的 WinVault keyring reference 显式传入；不得依赖环境变量或进程期随机默认值
      cookie: {name: halpha_csrf, path: /, domain: null, secure: false, same_site: Strict}
      always_set_cookie: true
      always_protect: [/api/v1/session/login]
      skip_if_scope: null
      coverage: 登录路径即使尚无 cookie 也必须校验；其余携带 session/cookie 的 unsafe methods 全部校验
      bearer_rule: Halpha API 不接受 Authorization Bearer 身份；不得把库的 Bearer 豁免解释为认证或授权
      additional_checks: Host 与 Origin 必须为本机允许值
      accepted_compromise: 不自研 session-bound token；采用库的签名双提交语义
    rate_limit:
      implementation: limits.strategies.FixedWindowRateLimiter(limits.storage.MemoryStorage()) 的薄 FastAPI 依赖
      key: 固定 owner 身份 + 规范化 client host；不得用 cookie/session 作为唯一 key
      login: 每 5 分钟最多 5 次失败；成功后用同一 limit/key 清除窗口；B01 验证命中、隔离、清除和重启重置

      activation: 同一 owner+client host+plan version 每 5 分钟最多 5 次激活请求；稳定 Command 幂等仍是防重复权威
      resume_new_risk: 同一 owner+client host+activation 每 5 分钟最多 5 次恢复增险请求；每次仍重读事实、授权与额度
      ordinary_unsafe_routes: 同一 owner+client host+规范化 route 每分钟最多 60 次；GET/HEAD 不计入该窗口
      safety_controls: 停止新增风险、退出策略和用户接管的首次持久提交不受限速阻断
      restart_semantics: 内存计数重启丢失可接受；它不是安全或业务事实权威
  credentials:
    backend: keyring.backends.Windows.WinVaultKeyring
    startup_check: backend class 必须精确匹配；Null、fallback、插件 backend 或读取失败均阻止相关能力
    app_identity_secrets:
      - owner password hash
      - session signing secret
      - csrf signing secret
      - SMTP credential
      - App、migration 与 backup PostgreSQL role credential
    executor_identity_secrets:
      - 当前 active profile 的 Binance API key/secret
      - Executor PostgreSQL role credential
    b00_qualification_reference:
      windows_identity: DESKTOP-9FRI62R\hhfor
      profile: BINANCE_DEMO
      service: Halpha/Binance/BINANCE_DEMO
      accounts: [api_key, api_secret]
      verified_at: 2026-07-16T16:18:46+08:00
      qualification: backend 精确为 keyring.backends.Windows.WinVaultKeyring，两个值均完成同身份回读一致性校验；只记录引用与存在性，不记录秘密值
      boundary: 仅作为当前 B00 资格化身份；B01 建立真实 Executor Task 身份后必须在该身份下重新注入并证明 App/Executor 交叉拒绝
    separation: App 不能读取 Binance key；Executor 不能读取 owner、Session、CSRF、SMTP、migration 或 backup secret
    forbidden_locations: [TOML, environment variable, command line, Task XML, URL, database business row, log, BuildManifest secret value]
    postgresql_auth_choice: P0 使用独立 SCRAM role password 的 keyring reference；不引入要求域配置的 SSPI 路径
  binance_account_prerequisites:
    product: USDⓈ-M perpetual
    position_mode: one-way
    asset_mode: single-asset
    margin_mode:
      accepted_actual: [isolated, crossed]
      handling: ISOLATED 按实际逐仓事实核算；CROSSED 使用逐仓等价 Halpha 内部额度核算，不反向把 ISOLATED 当作 CROSSED，也不声称场所资金已隔离
    leverage:
      accepted_actual: 场所报告的正杠杆值；P0 不把实际杠杆不高于 5 倍作为账户前置条件
      effective_risk_leverage: min(actual_leverage, 5)
      compatibility_direction: 实际高杠杆可向下兼容 P0 最高 5 倍内部风险上限；实际低杠杆不得向上放大
    halpha_behavior: 只读取得实际持仓模式、资产模式、逐工具保证金模式和杠杆；按上述兼容规则计算，不自动修改模式、杠杆、转账或提现
    api_permissions: profile 所需最小读/写权限；无提现权限；LIVE_WRITE 建议固定出口 IP allowlist
  windows:
    target_edition_and_build: Windows 10 Pro 22H2、10.0.19045、x64
    target_host_observed_at: 2026-07-16T15:56:32+08:00
    target_host_source: 目标主机 Win32_OperatingSystem、Win32_ComputerSystem 与项目所有者确认
    official_support_status: OUTSIDE_DOCUMENTED_WINDOWS_SERVER_2022_PLUS_BOUNDARY；B00 必须先在本机证明固定 wheel、TradingNode、Controller 与 Windows 生命周期可运行，否则 REJECTED
    service_manager: Windows Task Scheduler for App/Executor/backup；PostgreSQL 使用 Service Control Manager
    task_defaults:
      multiple_instances_policy: IgnoreNew
      execution_time_limit: PT0S
      triggers:
        - system startup
        - 每日固定起点、PT1M 间隔、P1D 周期的重复触发；运行中由 IgnoreNew 拒绝重叠，异常退出后由下一次触发恢复
      restart_on_failure: disabled；目标 Windows 10 黑盒证明普通非零退出和动作进程崩溃均不会触发该设置，不将无效 XML 声明作为恢复证据
      run_hidden: true
    executor_mutex: Global\Halpha.Executor.WriteOwner；加载 Binance 凭据或 TradingNode 前取得，进程终止由 OS 释放
    stop_control:
      implementation: pywin32 命名 Event + 一次性 halpha-control stop 命令；不是持久 worker 或业务状态
      names: [Global\Halpha.App.Stop, Global\Halpha.Executor.Stop]
      event_shape: manual-reset=true、initial-state=false；App/Executor 各自 CreateEvent 并等待自己的 Event，一次性控制命令 OpenEvent 后 SetEvent 两者
      control_identity: 只允许安装时登记的本机维护身份运行 halpha-control；该身份、App Task 和 Executor Task 的 Windows SID 是非秘密配置并进入 BuildManifest/config digest
      dacl: >-
        安装时用 pywin32 SECURITY_ATTRIBUTES 和保护型 DACL 只授予 LocalSystem、Builtin Administrators、登记维护 SID 及对应 Task SID 所需的 SYNCHRONIZE/EVENT_MODIFY_STATE；
        不授予 Everyone/Authenticated Users，进程不得退回创建者默认 DACL。SID 无法解析、DACL 不完全匹配或跨身份 OpenEvent/SetEvent 失败时阻断启动或真实写
      app_behavior: App 观察事件后令 Uvicorn 退出并等待 Notification 当前调用到安全边界
      executor_behavior: Executor 观察事件后拒绝新增险领取，依序停止/移除各适配器、停止 HalphaCoordinator、TradingNode stop、等待并 dispose
      scheduler_end: 只作上述正常停止超时后的人工强制 fallback；强制结束后下次启动必须先核对
    database_service_recovery: PostgreSQL 服务失败后由 SCM 重启；恢复后仍须先核对
    clock:
      sources: Windows UTC 与 Binance server time
      max_skew_ms_for_new_risk: 2000
      exceeded_behavior: 停止新增风险并形成可见 Task；不自动修改系统时钟
  email:
    implementation: Python stdlib smtplib/email/ssl + Notification transactional outbox
    sender_process: halpha-app NotificationDispatcher
    inbound_commands: none
    delivery_semantics: 交易事务只提交 Notification；SMTP 失败不回滚交易事实，按同一 notification_id 有界重试并最终 ABANDONED+Task
    unavailability_limit: App、PostgreSQL、网络、SMTP 或整机失效时不能保证即时邮件，也不宣称外部存活监控
  backup:
    implementation: PostgreSQL 17.10 pg_dump/pg_restore + Task Scheduler
    schedule: 每日 02:30 本地时间
    scope: DEMO 与 LIVE 分库备份，受限目录，保留 14 个日备份
    restore_drill: B04 至少一次全新空库恢复；以后每月一次人工触发并保存证据
    credential_bridge: >-
      一个一次性窄 launcher 用 App/backup 运行身份从 WinVault 取 SCRAM secret，建立仅该账户可读的临时 pgpass 文件，
      只把非秘密 PGPASSFILE 路径传给 pg_dump/pg_restore，并在 finally 删除；秘密不进入命令行、普通环境变量、Task XML 或日志。
      B01 验证 ACL、子进程退出/崩溃后的清理和日志扫描；不得建设第二备份格式或守护进程。
    excluded: [PITR, pgBackRest, Barman, hot standby, automatic failover]

p0_data_and_adapter_selection:
  stable_contracts: [HALPHA-DAT-002@v0.8.0, HALPHA-EXE-002@v1.2.0, HALPHA-TRADEPLAN-002@v0.10.0]
  venue: Binance USDⓈ-M perpetual
  instruments:
    real_acceptance: BTCUSDT-PERP
    demo_mapping_validation: [BTCUSDT-PERP, ETHUSDT-PERP]
  live_subscriptions:
    bar_types:
      source_1m: "{instrument_id}-1-MINUTE-LAST-EXTERNAL"
      target_15m: "{instrument_id}-15-MINUTE-LAST-INTERNAL@1-MINUTE-EXTERNAL"
    immediate_on_adapter_start_or_restart:
      - 公开 subscribe_mark_prices 订阅 Binance 1s mark price stream
      - 公开 subscribe_quote_ticks 订阅 Binance bookTicker，同一更新提供 bid/ask 价量
    bar_warmup_and_handoff:
      order:
        - 在任何 bar subscription 前注册 target_15m 的 Cython Donchian/ATR 和历史/实时 handlers
        - >-
          调用公开 request_aggregated_bars([target_15m], start=warmup_start, end=warmup_end, limit=1500,
          include_external_data=true, update_subscriptions=true, update_catalog=false)，不传 time_range_generator/durations_seconds；
          warmup_end=floor(当前 UTC 到 1m)-1ms，warmup_start=floor(warmup_end+1ms 到 15m)-72h。由固定版本 Binance adapter 以最后一根
          source bar open_time+1ms 游标和每页最多 1500 根自行分页；不得用 DataEngine 的 +1ns 分段在毫秒截断后制造边界重复。
          72h 远高于 schema 最大 96 根完整 15m 输入需要；不把 target 指标数量误作 source limit，也不等待实时积累
        - >-
          只在请求完成 callback 已处理全部历史数据、最近至少 max(channel_lookback_15m, atr_period+1) 根 target_15m 完整连续且历史末端 source_1m 连续时，
          callback 内无 await/yield 地依次公开 subscribe_bars(source_1m)、subscribe_bars(target_15m)；前者先同步登记适配器的 1m 确认输入，
          后者把请求保留的同一原生聚合器转入实时并复用已登记 source，DataEngine/client 必须合并为一个底层场所 source subscription
      boundary_rule: >-
        历史与实时共享同一 BarType 和原生聚合器；Halpha 只按 bar_type、区间与 ts_event 校验闭合、顺序、重复和 15:1 source 覆盖。
        time_bars_skip_first_non_full_bar=true 可能丢弃历史请求生成的首个 target bar，因此只以 callback 后实际完整连续数量验收，不假定 72h 必得 288 根。
        完全相同的边界重放只处理一次，异值重复、缺口、乱序或 callback 前实时 bar 均阻止新增风险；不自研回填、重采样、时钟对齐器或第二 15m 源
    risk_increase_freshness:
      cutoff: 每次拟提交增险执行动作前固定同一个 pre_submit_cutoff，以下事实均须属于同 environment/account/instrument 且 observed_at 不晚于该 cutoff
      mark_price_max_age_seconds: 3
      top_of_book_max_age_seconds: 3
      source_1m_rule: 必须是 pre_submit_cutoff 前最近一个应闭合的 1m 区间，且从其 interval_end 到 cutoff 不超过 65 秒
      target_15m_rule: 必须是该判断 cutoff 前最近一个应完整闭合的 15m 区间，并已由恰好 15 根连续 source_1m 证明；不得以普通 age 窗口跳过缺失桶
      queried_rules_and_account_max_age_seconds: 5
      queried_rules_and_account_scope: INSTRUMENT_RULES 与含账户/持仓模式、逐工具 margin mode/leverage、实际 maker/taker fee 的 ACCOUNT_STATE 必须在本次 StrategyProposal 后完成查询，并在 pre_submit_cutoff 时不超过 5 秒
      capital_and_authorization_contract: HALPHA-TRADEPLAN-002@v0.10.0、HALPHA-CAP-002@v1.2.0、HALPHA-EXE-002@v1.2.0；不使用时间缓存
    lifecycle: 每个适配器只请求并订阅自己的 instrument；停止/移除时按组件公开生命周期解除，重启重复同一预热—回调—实时接续流程后才可形成新入场判断
    failure_contract: HALPHA-DAT-002@v0.8.0、HALPHA-TRADEPLAN-002@v0.10.0、HALPHA-EXE-002@v1.2.0；本计划只固定上述 freshness 数值与组件接线
  bar_source:
    venue_input: K 线输入只使用完整闭合 1m LAST contract bars；mark/quote 只服务实时估值、sizing 与 freshness，不形成第二 K 线源
    higher_timeframe: 用 NautilusTrader DataEngine/BacktestEngine 的精确 target_15m 把 source_1m 聚合为完整闭合 15m；实时必须订阅 target_15m，不把仅订阅 source_1m 误认为会向策略发布目标 bar；不维护第二场所 15m 订阅、历史文件或自研对齐器
    qualification: B00 已用精确 BarType、预热、边界、缺口、重复、回调接续和重启黄金向量，并与 Binance 官方 15m 抽样核对通过；B01/B04 仍需产品与持续运行证据
  attribution_and_scope_contract: HALPHA-DAT-002@v0.8.0、HALPHA-EXE-002@v1.2.0、HALPHA-CAP-002@v1.2.0；事实权威、外部归属、激活排他和闭合语义不在 L4 复制
  read_only_supplement:
    selection: 复用 NautilusTrader 1.230.0 公开 get_cached_binance_http_client(...) 返回的同包 BinanceHttpClient；不直接访问 execution client 私有 _http_client，也不另建 client
    b00_qualified_gaps: [已持久 UUID32 的普通/算法订单结果, 实际 funding/income, commission detail, position or leverage fields missing from public high-level event]
    interface: 只导出列明 GET 查询并输出同一 VenueFact；不得暴露 POST/PUT/DELETE、下单、撤单、改模式或改杠杆
    storage: none；无 cache、checkpoint、worker、第二数据库或第二事实权威
    fallback: none；不自动加入 Binance SDK 或 raw client
  framework_reconciliation:
    enabled: startup and continuous
    covers: ordinary orders、conditional/algo orders、fills and positions
    external_order_claims: null
    qualification: B00 已证明已知 UUID 的 EXTERNAL 技术对象可经选定入口安全 query/cancel/接收终态；不启用 per-activation claim
    unclaimed_visibility: visible but not attributed
    product_projection_contract: HALPHA-DAT-002@v0.8.0、HALPHA-EXE-002@v1.2.0；组件合成事件与产品事实边界不在 L4 复制

