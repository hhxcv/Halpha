schema_version: 3
document_id: HALPHA-PLAN-001
level: L4
language: zh-CN
as_of: 2026-07-19

current_summary: >-
  当前目标是在现有 Windows 10 单机上完成 P0 最小交易闭环。流程按实际影响验证，
  不设置小时门、多轴资格、外置资金授权链或默认长期观察。独立策略研究可与产品建设并行。

current_scope:
  stage: P0
  status: IN_PROGRESS
  outcome: >-
    完成计划配置与固定、一次激活、持续监控、动作执行、保护、退出、核对、复盘和用户接管。
  includes:
    - DEMO 完整闭环
    - LIVE_READ_ONLY 公开行情观察
    - LIVE_WRITE 无凭据建设、安全反例和一次受限真实激活能力
    - 本地交易工作台、Windows 运行、邮件通知、备份恢复和官方入口接管
  excludes:
    - 第二个正式策略
    - 多账户、多场所和组合优化
    - 自动扩大资金范围
    - 高可用、微服务、机构审批或治理平台

current_decisions:
  target_host: Windows 10 Pro 22H2 x64
  host_rule: 不迁移、不缩减目标；如实记录依赖支持限制，并以本机直接验证判断当前可用性
  product_scope: 完成全部 P0 内容
  development_flow: 在已授权 P0 范围内按直接依赖连续实施，不设置建设继续门
  build_identity: 每组产品输入只使用一个 product_build_id
  observation: 只有当前发布、部署或真实资金决定提出直接问题时才增加观察
  research: 独立研究不依赖产品建设完成，可在 research 路径并行进行

current_facts:
  source:
    repository: 当前 Git 工作区
    identity_rule: 构建或验证时直接读取提交、分支和工作树；本计划不抄写易失真的 SHA
    checked_at: 2026-07-19
  runtime:
    real_write_state: CLOSED
    live_credentials_loaded: false
    live_execution_actions_created: false
    venue_live_writes_observed: false
  evidence_limit: >-
    历史测试和观察只说明当时输入；当前实现尚未完成全部 P0，因此不声明产品闭环或真实执行已经可用。

target_runtime:
  host:
    operating_system: Windows 10 Pro 22H2
    build: 10.0.19045
    architecture: x64
    dependency_caveat: >-
      当前 NautilusTrader 版本的常规 Windows 支持边界不包含该主机；项目记录此限制，
      通过本机安装、启停、重启和联合链路验证判断当前可用性，不表述为供应商保证。
  trading:
    venue: Binance USDⓈ-M
    demo_instruments: [BTCUSDT-PERP, ETHUSDT-PERP]
    first_live_instrument: BTCUSDT-PERP
    strategy: ONE_SHOT_DONCHIAN_ATR_BREAKOUT
    account_configuration_mutation: DISABLED
  topology:
    database: PostgreSQL
    processes: [halpha-app, halpha-executor]
    venue_write_paths_per_environment: 1
    web: 127.0.0.1 本地 Web
    notification: EMAIL_ONLY

component_sources:
  python_locks:
    - requirements/runtime.txt
    - requirements/dev.txt
  frontend_lock: frontend/package-lock.json
  project_metadata: pyproject.toml
  runtime_configuration: config/*.toml
  key_current_versions:
    python: 3.13.14
    nautilus_trader: 1.230.0
    postgresql: 17.10
    node: 24.18.0
  rule: 精确依赖以锁文件为准；运行时不下载依赖

current_strategy:
  owner: HALPHA-ALP-002
  strategy_id: ONE_SHOT_DONCHIAN_ATR_BREAKOUT
  strategy_version: 1.0.0
  registry: src/halpha/planning/strategy_registry.json
  instrument: BTCUSDT-PERP
  supported_directions: [LONG, SHORT]
  historical_limit: 历史模型未包含 funding，只支持机制检查，不证明实时净收益或 Alpha

product_build:
  target: ONE_PRODUCT_BUILD_ID
  current_product_build_id: null
  implementation: src/halpha/build_manifest.py
  current_status: NOT_CREATED_FOR_CURRENT_PRODUCT_INPUTS
  rule: 由实现读取实际产品输入；历史构建记录不代表当前构建

current_work:
  status: IN_PROGRESS
  remaining:
    - 删除残留的额外授权、资格状态和硬编码建设状态
    - 完成交易工作台剩余交互和实际浏览器检查
    - 使 PlanActivation 直接携带本次资本与动作边界
    - 完成真实写无凭据实现、秘密最后加载和关闭态反例
    - 在最终产品输入上重跑策略、Demo、数据库、Windows、SMTP、前端和故障检查
    - 生成 product_build_id，并检查部署、停止、备份、恢复和接管
    - 由用户在产品中配置并激活一次受限真实计划
  completion:
    - 后端、前端和浏览器相关检查通过
    - Demo 完整周期通过
    - Windows 启停、互斥、凭据、日志、备份和恢复通过
    - product_build_id 与部署输入一致
    - 一次受限真实激活完成入场、保护、退出、核对、复盘和责任闭合
    - 停止新增风险、退出策略和用户接管可用

live_safety:
  design_owner: HALPHA-TRADEPLAN-002、HALPHA-CAP-002、HALPHA-EXE-002、HALPHA-SYS-002
  real_write_state: CLOSED
  current_activation_id: null
  live_credentials_loaded: false
  unique_writer_confirmed: false
  facts_current: false

independent_research:
  product_work_dependency: NONE
  owned_path: research/**
  current_question: NOT_SELECTED
  product_effects: NONE_UNTIL_OWNER_SELECTS_RESULT

observation:
  mandatory_elapsed_gate: NONE
  current_observation: NONE
