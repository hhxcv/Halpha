      backtest:
        evidence_ref: build/qualification/b04-historical-backtest.json
        evidence_digest: sha256:6719a0ea351d9440406f2af650ea32a1d1c568f3c8786c79dc53d91879485ca0
        errors: []
        development_episodes: 1276
        holdout_episodes: 666
        traded_and_closed_episodes: 552
        expired_without_entry_episodes: 1390
