third_party_first_policy:
  selection_rule: >-
    先验证成熟组件的固定版本、官方适配器、许可证、平台支持和真实 API；可妥协的技术差异直接接受组件语义，
    只有一次性激活、资本归属、真实写唯一性、结果未知、安全或恢复正确性无法由组件表达时才保留最薄 Halpha 语义。
  no_parallel_fallback: 同一能力不得同时运行组件实现与自研实现；组件资格失败只能阻断并修订本 L4
  l3_l4_split: L3 记录长期组件使用契约；本文件固定精确版本、配置、平台资格和证据

complexity_budget:
  comparison_baseline: 本轮正式化前设计
  before:
    authoritative_persisted_record_families: 26
    durable_worker_classes: 5
    business_modules: 5
    runtime_processes: 2
    authoritative_database_products: 1
    real_risk_authorization_paths: 1
    real_venue_write_pipelines: 1

    independently_released_artifact_groups: 1
  after_hard_limits:
    authoritative_persisted_record_families_max: 16
    durable_worker_classes_max: 2
    business_modules_max: 5
    runtime_processes_max: 2
    authoritative_database_products_max: 1
    real_risk_authorization_paths_max: 1
    real_venue_write_pipelines_max: 1
    independently_released_artifact_groups_max: 1
    new_general_platforms_max: 0
  lifecycle_inventory_after:
    scheduled_jobs: 3（App、Executor、backup；不是 3 个持久 worker）
    external_service_instances: 1 个 PostgreSQL 服务实例可承载分离的 DEMO/LIVE 数据库
    transient_tool_processes: pg_dump、pg_restore 和一次性控制/迁移命令；均无持久 claim 或恢复生命周期
    rebuildable_evidence_storage: >-
      1 个文件型 ParquetDataCatalog 及其 Binance 原始 bars、checksum、manifest 和报告目录；不是产品数据库或记录族，
      可从带摘要原始输入重建，B01 固定目录/保留/删除/导出/退出契约，B04 记录实际构建与恢复证据
    direct_dependency_rule: 每项直接依赖必须替代列明的自研责任或提供已确认价值，并由 B01 的完整许可证/升级/退出台账证明总维护面不高于修订前
  persisted_record_inventory:
    tradeplan_4: [TradePlanDraft, TradePlanVersion, PlanActivation, PlanEvent]
    dat_1: [VenueFact]
    cap_4: [AccountCapitalLimitVersion, MachineAuthorizationVersion, PlanAllocation, StopStateVersion]
    exe_1: [PendingAction]
    out_2: [Review, ImprovementHandoff]
    ux_4: [Task, Command, Receipt, Notification]
  embedded_non_families:
    - StrategyProposal 是 ALP 瞬态输出；TRADEPLAN 的 ProposedAction、条件判断输入摘要和 CAP 决定嵌入 PlanEvent
    - 规则游标、deadline、当前 ConditionJudgement、保护状态和 EXE closure digest 引用嵌入 PlanActivation；最大损失锁存、loss_fact_cutoff 与 last_funding_query_cutoff 只嵌入 PlanAllocation
    - FactUnknownValue 完整嵌入产生限制的 PlanActivation/PlanEvent/PendingAction；修正关系只作 VenueFact 可选元数据，不建立 FactUnknown/FactCorrection 记录族或 worker
    - UUID32、调用证据、结果未知、保护与单动作闭合证据嵌入 PendingAction
    - CodeStrategyDefinition 是随代码发布的常量；证据摘要、eligibility 与适用范围是 BuildManifest 不可分字段，不存在 StrategyEvidenceAssessment 记录或版本
    - 框架 cache、portfolio、risk、reconciliation 和 BacktestEngine 报告均不是 Halpha 记录族
  durable_workers:
    - name: HalphaCoordinator
      process: halpha-executor
      responsibilities: HalphaStrategyAdapter 恢复、StrategyProposal/领域来源交接、PendingAction 提交、事实映射、保护、损失、框架核对、闭环，以及已完成激活缺失/落后 Review 的可派生恢复
    - name: NotificationDispatcher
      process: halpha-app
      responsibilities: 领取已有 Notification、SMTP 投递、失败状态和可见 Task
  no_hidden_worker_rule: >-
    框架订阅、K 线、timer、指标、Controller、reconciliation、HTTP 请求处理、查询投影、OUT 归集和 pg_dump 不得取得独立 Halpha
    checkpoint、claim、due、退避或恢复生命周期；出现即重新计数并使复杂度门失败。
  result: >-
    结构复杂度由 26→16 个记录族、5→2 类持久 worker，且进程、数据库产品、授权路径、场所写路径和发布组均不增加。
    这只能证明结构维度下降；B00/B01 还必须用依赖、薄适配、配置所有者、许可证、升级、退出、测试和运维台账证明全生命周期复杂度不高于修订前，否则组件选择或本计划不得通过。

runtime_architecture:
  business_modules:
    - planning
    - venue_integration
    - capital
    - outcomes
    - user_workbench
  authoritative_database: PostgreSQL 17.10
  logical_database_rule: DEMO 与 LIVE 使用独立数据库、角色、配置和凭据；可以位于同一 PostgreSQL 实例
  processes:
    halpha_app:
      owns:
        - FastAPI 本地 UI/API 与静态前端
        - owner 身份、Session、CSRF、Command/Receipt 与查询投影
        - 计划固定和激活事务
        - NotificationDispatcher 与 SMTP
      forbidden:
        - Binance 凭据或连接
        - TradingNode、行情订阅、条件评价或真实写方法
    halpha_executor:
      owns:
        - 唯一 NautilusTrader TradingNode
        - 同一节点内的 Binance DataClient 与 ExecutionClient
        - Controller 及每个未闭合且非 USER_TAKEOVER 的 PlanActivation 一个 HalphaStrategyAdapter 与一个纯策略逻辑对象
        - 唯一 HalphaCoordinator
        - 唯一 Binance 凭据、VenueFact 与 PendingAction 写路径
      forbidden:
        - UI、SMTP、owner 密码或第二 TradingNode
        - 第二 Binance SDK 写适配器、raw HTTP/WebSocket 写路径、框架 event store 或 Redis cache
  environment_profile:
    defined_profiles: [BINANCE_DEMO, BINANCE_LIVE_READ_ONLY, BINANCE_LIVE_WRITE]
    release_group: App 与 Executor 必须作为同一发布组装载同一 profile、环境数据库与 BuildManifest/config digest；不允许页面/命令和执行器指向不同环境
    concurrency: 一个 App+Executor 发布组一次只装载一个 profile，不同时连接 DEMO 与 LIVE
    write_capability:
      BINANCE_DEMO: B00 只允许隔离 qualification fixture 按 required_outputs 执行最窄 Demo 提交/查询/撤销与组合探针，不装载产品运行时、不形成产品记录或开放业务责任；产品 Demo 写仍仅在 B03 及以后按已通过 B00 的建设包启用
      BINANCE_LIVE_READ_ONLY: profile 硬禁用私有已持久动作门且凭据没有交易权限；只产生 preview/事实，不建立真实 PendingAction
      BINANCE_LIVE_WRITE: 仅 B05 前置条件全部成立且 BuildManifest 无漂移时启用
    switch_rule: >-
      仅当当前 profile 的全部 PlanActivation 已 closure/release，且不存在开放或 UNKNOWN 的 PendingAction、订单、保护、退出或核对责任时，
      才可受控停止 App、各 HalphaStrategyAdapter、TradingNode 与 Executor，切换数据库/凭据/配置，并在两进程的 BuildManifest/profile/database digest 一致后重新启动、先核对；否则禁止切换。
      用户接管不等于 closure/release，不能绕过该门禁。禁止 profile 热切换或自动 fallback。
  production_ports:
    web: 127.0.0.1 only
    database: local or owner-approved private host only
    inbound_external: none
  real_write_path: >-
    StrategyProposal、持久 deadline、场所事实或用户 Command → TRADEPLAN 的 PlanEvent+ProposedAction 与 CAP 决定
    → PostgreSQL 已提交 PendingAction → HalphaCoordinator 提交前复核
    → OrderFactory → 对应 HalphaStrategyAdapter 的私有已持久动作门 → NautilusTrader Binance adapter → VenueFact/PendingAction/PlanActivation 核对。
  direct_write_guard: >-
    纯策略逻辑不得导入 Strategy、TradingNode、OrderFactory 或 ExecutionClient，也不得取得任何订单写对象；除适配器私有动作门中白名单的
    super().submit_order/super().cancel_order 外，静态检查禁止 submit_order_list、cancel_orders、cancel_all_orders、modify_order、close_position、
    close_all_positions、market_exit 及等价写入口。私有门调用前必须核对已提交 PendingAction。

