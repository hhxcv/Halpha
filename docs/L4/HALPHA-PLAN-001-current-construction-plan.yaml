final_acceptance_statement: >-
  本计划已由项目所有者正式接受。它保持 16 个记录族、2 个持久 worker、2 个进程、1 个数据库产品和 1 条真实写路径；
  本轮只闭合计划复用、用户接管关闭和首个 LIVE 参数选择三项核心缺口，并记录不阻断 P0 的上游冲突。L4 非核心细节留待实现证据调整，B00 通过前真实写保持禁用。
